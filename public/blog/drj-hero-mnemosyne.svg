<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0F1F"/>
      <stop offset="50%" stop-color="#001F3F"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </linearGradient>
    <radialGradient id="pulse" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#00E5A0" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00E5A0" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.03" stroke="#00E5A0">
    <line x1="0" y1="100" x2="1200" y2="100"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/><line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Pulse behind icon -->
  <circle cx="220" cy="315" r="180" fill="url(#pulse)"/>

  <!-- Brain/Database hybrid icon -->
  <g transform="translate(220, 315)" filter="url(#glow)">
    <!-- Outer brain-like shape (stylized two hemispheres) -->
    <path d="M -50,-50 C -80,-50 -75,-80 -55,-85 C -45,-88 -35,-80 -25,-90 C -15,-100 0,-95 10,-90 C 20,-85 30,-95 40,-90 C 55,-80 55,-50 45,-45 C 55,-30 45,-15 35,-10 C 25,-5 20,10 10,15 C 0,20 -10,10 -20,15 C -30,20 -35,10 -45,0 C -55,-10 -50,-30 -50,-50Z" fill="none" stroke="#00E5A0" stroke-width="2.5" opacity="0.9"/>

    <!-- Center split line -->
    <line x1="-5" y1="-80" x2="-5" y2="20" stroke="#00E5A0" stroke-width="1.5" opacity="0.4"/>

    <!-- Synaptic connections (left hemisphere) -->
    <g opacity="0.5" stroke="#00E5A0" stroke-width="1" fill="none">
      <path d="M -60,-60 C -80,-70 -85,-40 -60,-40"/>
      <path d="M -55,-20 C -75,-15 -80,0 -60,0"/>
    </g>

    <!-- Neural nodes inside brain -->
    <circle cx="-25" cy="-50" r="3" fill="#00E5A0" opacity="0.5"/>
    <circle cx="-35" cy="-30" r="2" fill="#00E5A0" opacity="0.4"/>
    <circle cx="-15" cy="-60" r="2.5" fill="#00E5A0" opacity="0.5"/>
    <circle cx="-28" cy="-10" r="2" fill="#00E5A0" opacity="0.3"/>
    <circle cx="-12" cy="-35" r="2" fill="#00E5A0" opacity="0.4"/>

    <!-- Database cylinder below brain -->
    <ellipse cx="0" cy="38" rx="30" ry="8" fill="none" stroke="#00E5A0" stroke-width="2"/>
    <line x1="-30" y1="38" x2="-30" y2="55" stroke="#00E5A0" stroke-width="2"/>
    <line x1="30" y1="38" x2="30" y2="55" stroke="#00E5A0" stroke-width="2"/>
    <ellipse cx="0" cy="55" rx="30" ry="8" fill="none" stroke="#00E5A0" stroke-width="2"/>

    <!-- Database data lines -->
    <line x1="-20" y1="46" x2="20" y2="46" stroke="#00E5A0" stroke-width="1" opacity="0.4"/>
    <line x1="-22" y1="50" x2="22" y2="50" stroke="#00E5A0" stroke-width="1" opacity="0.3"/>

    <!-- Connecting path: brain → database -->
    <path d="M -5,20 L -15,28 L -15,38" stroke="#00E5A0" stroke-width="1.5" fill="none" opacity="0.4"/>
    <path d="M 5,20 L 15,28 L 15,38" stroke="#00E5A0" stroke-width="1.5" fill="none" opacity="0.4"/>

    <!-- Circuit traces to the right -->
    <g opacity="0.35" stroke="#00E5A0" stroke-width="1" fill="none">
      <path d="M 45,-45 L 65,-45 L 65,-70"/>
      <path d="M 45,0 L 70,0 L 70,25"/>
      <path d="M 30,55 L 50,55 L 50,75"/>
    </g>
    <circle cx="65" cy="-70" r="2.5" fill="#00E5A0" opacity="0.5"/>
    <circle cx="70" cy="25" r="2.5" fill="#00E5A0" opacity="0.5"/>
    <circle cx="50" cy="75" r="2.5" fill="#00E5A0" opacity="0.5"/>
  </g>

  <!-- Right side tech circuits -->
  <g opacity="0.04" stroke="#00E5A0" stroke-width="1.5" fill="none">
    <path d="M 850,80 L 980,80 L 980,180 L 1120,180"/>
    <path d="M 900,130 L 1050,130"/>
    <path d="M 1050,180 L 1050,280 L 950,280"/>
    <circle cx="1120" cy="180" r="3.5" fill="#00E5A0" opacity="0.3"/>
    <circle cx="1050" cy="130" r="2.5" fill="#00E5A0" opacity="0.3"/>
    <circle cx="950" cy="280" r="2.5" fill="#00E5A0" opacity="0.3"/>
    <path d="M 820,400 L 920,400 L 920,500 L 1080,500"/>
    <path d="M 960,450 L 1120,450"/>
    <circle cx="1080" cy="500" r="3" fill="#00E5A0" opacity="0.3"/>
    <circle cx="1120" cy="450" r="2.5" fill="#00E5A0" opacity="0.3"/>
  </g>

  <!-- Title -->
  <text x="440" y="260" fill="#E2E8F0" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="bold" letter-spacing="-0.5">
    Mnemosyne
  </text>

  <!-- Subtitle -->
  <text x="440" y="308" fill="#00E5A0" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="400" letter-spacing="2">
    SOVEREIGN AGENT MEMORY
  </text>

  <!-- Divider -->
  <line x1="440" y1="330" x2="770" y2="330" stroke="#00E5A0" stroke-width="1.5" opacity="0.25"/>

  <!-- Tagline -->
  <text x="440" y="365" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="400">
    100% offline. SQLite + FTS5. Zero cloud. Zero compromise.
  </text>

  <!-- Bottom bar -->
  <rect x="0" y="627" width="1200" height="3" fill="#00E5A0" opacity="0.4"/>
</svg>
