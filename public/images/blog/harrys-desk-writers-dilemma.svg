<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0F1F"/>
      <stop offset="50%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#16213E"/>
    </linearGradient>
    <radialGradient id="pulse" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid overlay -->
  <g opacity="0.03" stroke="#A78BFA">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Pulse circle behind icon -->
  <circle cx="220" cy="315" r="180" fill="url(#pulse)"/>

  <!-- Writer's Dilemma Icon: Pen nib with typewriter bars morphing into circuit lines -->
  
  <!-- Pen nib body -->
  <polygon points="220,230 180,380 260,380" fill="none" stroke="#A78BFA" stroke-width="2.5" opacity="0.9"/>
  
  <!-- Pen nib ink channel -->
  <line x1="220" y1="230" x2="220" y2="355" stroke="#A78BFA" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Pen nib ink drop -->
  <circle cx="220" cy="375" r="4" fill="#A78BFA" opacity="0.8"/>
  
  <!-- Typewriter bars / circuit lines -->
  <rect x="150" y="300" width="50" height="6" rx="3" fill="#A78BFA" opacity="0.4"/>
  <rect x="240" y="300" width="50" height="6" rx="3" fill="#A78BFA" opacity="0.4"/>
  
  <!-- AI circuit nodes emerging from writing -->
  <circle cx="160" cy="310" r="3" fill="#A78BFA" opacity="0.7"/>
  <circle cx="280" cy="310" r="3" fill="#A78BFA" opacity="0.7"/>
  
  <!-- circuit lines connecting -->
  <path d="M 160,310 L 130,250" stroke="#A78BFA" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M 280,310 L 310,250" stroke="#A78BFA" stroke-width="1" fill="none" opacity="0.5"/>
  
  <circle cx="130" cy="250" r="4" fill="#A78BFA" opacity="0.6"/>
  <circle cx="310" cy="250" r="4" fill="#A78BFA" opacity="0.6"/>
  
  <!-- Binary/text particles -->
  <text x="125" y="240" fill="#A78BFA" font-family="system-ui, monospace" font-size="10" opacity="0.5">101</text>
  <text x="300" y="240" fill="#A78BFA" font-family="system-ui, monospace" font-size="10" opacity="0.5">AI</text>

  <!-- Right-side circuit decorations -->
  <g opacity="0.04" stroke="#A78BFA" stroke-width="1.5" fill="none">
    <path d="M 850,80 L 980,80 L 980,180 L 1120,180"/>
    <path d="M 900,130 L 1050,130"/>
    <circle cx="1120" cy="180" r="3.5" fill="#A78BFA" opacity="0.3"/>
    <circle cx="1050" cy="130" r="2.5" fill="#A78BFA" opacity="0.3"/>
    <path d="M 820,420 L 920,420 L 920,520 L 1080,520"/>
    <circle cx="1080" cy="520" r="3" fill="#A78BFA" opacity="0.3"/>
  </g>

  <!-- Title -->
  <text x="440" y="250" fill="#E2E8F0" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="bold" letter-spacing="-0.5">
    The Writer's Dilemma
  </text>

  <!-- Subtitle -->
  <text x="440" y="298" fill="#A78BFA" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="400" letter-spacing="2">
    WHY AI CHANGES EVERYTHING
  </text>

  <!-- Divider -->
  <line x1="440" y1="320" x2="810" y2="320" stroke="#A78BFA" stroke-width="1.5" opacity="0.25"/>

  <!-- Tagline -->
  <text x="440" y="355" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="400">
    When the machine writes sentences, what does the writer become?
  </text>

  <!-- Bottom accent bar -->
  <rect x="0" y="627" width="1200" height="3" fill="#A78BFA" opacity="0.4"/>
</svg>