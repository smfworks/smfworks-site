<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Hermes Repo Doctor</title>
  <desc id="desc">A four-stage terminal triage pipeline: capture, bound, diagnose, verify.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#080C18"/>
      <stop offset="0.58" stop-color="#0A0F1F"/>
      <stop offset="1" stop-color="#111A2D"/>
    </linearGradient>
    <linearGradient id="orange" x1="80" y1="0" x2="1120" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF6B00"/>
      <stop offset="1" stop-color="#FF9B42"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#94A3B8" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <circle cx="1080" cy="92" r="180" fill="#FF6B00" fill-opacity="0.035"/>
  <circle cx="1080" cy="92" r="114" fill="none" stroke="#FF6B00" stroke-opacity="0.09" stroke-width="1"/>
  <circle cx="1080" cy="92" r="66" fill="none" stroke="#FF6B00" stroke-opacity="0.15" stroke-width="1"/>

  <g font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
    <text x="76" y="66" fill="#FF6B00" font-size="15" font-weight="800" letter-spacing="3">LIAM'S LANDING // BUILD NOTE 0716</text>
    <text x="76" y="137" fill="#F8FAFC" font-size="57" font-weight="850" letter-spacing="-1.2">HERMES REPO DOCTOR</text>
    <text x="78" y="177" fill="#FF9B42" font-size="20" font-weight="700" letter-spacing="3.4">ONE-SHOT TERMINAL TRIAGE</text>

    <g transform="translate(76 222)">
      <rect width="1048" height="126" rx="16" fill="#0D1528" stroke="#25324A" stroke-width="1.5"/>
      <rect x="1" y="1" width="1046" height="34" rx="15" fill="#131E34"/>
      <circle cx="22" cy="18" r="5" fill="#FF6B00"/>
      <circle cx="40" cy="18" r="5" fill="#F59E0B" fill-opacity="0.62"/>
      <circle cx="58" cy="18" r="5" fill="#64748B" fill-opacity="0.7"/>
      <text x="80" y="23" fill="#64748B" font-size="12" font-weight="700" letter-spacing="1.5">REPO-DOCTOR.SH</text>
      <text x="27" y="76" fill="#FF6B00" font-size="22" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-weight="700">$</text>
      <text x="54" y="76" fill="#E2E8F0" font-size="22" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">hermes-repo-doctor -- pytest -q</text>
      <text x="27" y="105" fill="#7DD3FC" font-size="16" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">→ .hermes/repo-doctor.md</text>
      <g transform="translate(814 53)">
        <rect width="204" height="47" rx="9" fill="#FF6B00" fill-opacity="0.08" stroke="#FF6B00" stroke-opacity="0.46"/>
        <path d="M17 24l8 8 16-19" fill="none" stroke="#FF6B00" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
        <text x="55" y="30" fill="#FED7AA" font-size="14" font-weight="750" letter-spacing="1.2">REPORT VERIFIED</text>
      </g>
    </g>

    <g transform="translate(76 410)">
      <path d="M218 57H278M482 57H542M746 57H806" fill="none" stroke="url(#orange)" stroke-width="3" stroke-linecap="round"/>
      <path d="M270 51l10 6-10 6M534 51l10 6-10 6M798 51l10 6-10 6" fill="none" stroke="#FF6B00" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

      <g>
        <rect width="218" height="116" rx="14" fill="#111B2F" stroke="#334155"/>
        <circle cx="31" cy="31" r="16" fill="#FF6B00" fill-opacity="0.13" stroke="#FF6B00"/>
        <text x="31" y="36" fill="#FF9B42" font-size="13" font-weight="850" text-anchor="middle">01</text>
        <text x="57" y="37" fill="#F8FAFC" font-size="18" font-weight="800" letter-spacing="1.4">CAPTURE</text>
        <text x="21" y="76" fill="#94A3B8" font-size="14">test + git evidence</text>
        <text x="21" y="97" fill="#64748B" font-size="12" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">exit code preserved</text>
      </g>

      <g transform="translate(264)">
        <rect width="218" height="116" rx="14" fill="#111B2F" stroke="#334155"/>
        <circle cx="31" cy="31" r="16" fill="#FF6B00" fill-opacity="0.13" stroke="#FF6B00"/>
        <text x="31" y="36" fill="#FF9B42" font-size="13" font-weight="850" text-anchor="middle">02</text>
        <text x="57" y="37" fill="#F8FAFC" font-size="18" font-weight="800" letter-spacing="1.4">BOUND</text>
        <text x="21" y="76" fill="#94A3B8" font-size="14">24 KB per channel</text>
        <text x="21" y="97" fill="#64748B" font-size="12" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">signal over noise</text>
      </g>

      <g transform="translate(528)">
        <rect width="218" height="116" rx="14" fill="#111B2F" stroke="#FF6B00" stroke-opacity="0.58"/>
        <circle cx="31" cy="31" r="16" fill="#FF6B00" fill-opacity="0.17" stroke="#FF6B00"/>
        <text x="31" y="36" fill="#FF9B42" font-size="13" font-weight="850" text-anchor="middle">03</text>
        <text x="57" y="37" fill="#F8FAFC" font-size="18" font-weight="800" letter-spacing="1.4">DIAGNOSE</text>
        <text x="21" y="76" fill="#94A3B8" font-size="14">Hermes --oneshot</text>
        <text x="21" y="97" fill="#64748B" font-size="12" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">safe toolset</text>
      </g>

      <g transform="translate(792)">
        <rect width="256" height="116" rx="14" fill="#111B2F" stroke="#334155"/>
        <circle cx="31" cy="31" r="16" fill="#FF6B00" fill-opacity="0.13" stroke="#FF6B00"/>
        <text x="31" y="36" fill="#FF9B42" font-size="13" font-weight="850" text-anchor="middle">04</text>
        <text x="57" y="37" fill="#F8FAFC" font-size="18" font-weight="800" letter-spacing="1.4">VERIFY</text>
        <text x="21" y="76" fill="#94A3B8" font-size="14">contract + usage receipt</text>
        <text x="21" y="97" fill="#64748B" font-size="12" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">falsifiable output</text>
      </g>
    </g>

    <text x="76" y="594" fill="#64748B" font-size="13" letter-spacing="1.3">SHELL OWNS EVIDENCE // HERMES OWNS JUDGMENT</text>
    <text x="1124" y="594" fill="#FF6B00" font-size="13" font-weight="800" text-anchor="end">#FF6B00</text>
  </g>

  <rect x="0" y="627" width="1200" height="3" fill="#FF6B00"/>
</svg>
