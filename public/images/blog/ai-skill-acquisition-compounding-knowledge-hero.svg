<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="576" viewBox="0 0 1024 576">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0f1d35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#162544;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="forge" x1="0%" y1="80%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#d97706;stop-opacity:0.9" />
      <stop offset="40%" style="stop-color:#b45309;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#92400e;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#d97706;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#92400e;stop-opacity:0" />
    </linearGradient>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="576" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <g stroke="#1e3a5f" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="72" x2="1024" y2="72"/>
    <line x1="0" y1="144" x2="1024" y2="144"/>
    <line x1="0" y1="216" x2="1024" y2="216"/>
    <line x1="0" y1="288" x2="1024" y2="288"/>
    <line x1="0" y1="360" x2="1024" y2="360"/>
    <line x1="0" y1="432" x2="1024" y2="432"/>
    <line x1="0" y1="504" x2="1024" y2="504"/>
    <line x1="128" y1="0" x2="128" y2="576"/>
    <line x1="256" y1="0" x2="256" y2="576"/>
    <line x1="384" y1="0" x2="384" y2="576"/>
    <line x1="512" y1="0" x2="512" y2="576"/>
    <line x1="640" y1="0" x2="640" y2="576"/>
    <line x1="768" y1="0" x2="768" y2="576"/>
    <line x1="896" y1="0" x2="896" y2="576"/>
  </g>
  
  <!-- Central anvil/forge shape -->
  <path d="M 412 480 L 412 260 L 512 220 L 612 260 L 612 480 Z" fill="#1a2744" stroke="#d97706" stroke-width="2" opacity="0.8"/>
  <path d="M 432 480 L 432 275 L 512 242 L 592 275 L 592 480 Z" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>
  
  <!-- Hammer strike sparks - central burst -->
  <circle cx="512" cy="248" r="35" fill="url(#glow)" opacity="0.6"/>
  <g filter="url(#strongglow)">
    <circle cx="512" cy="248" r="8" fill="#fbbf24" opacity="0.9"/>
  </g>
  
  <!-- Spark lines radiating from center -->
  <g stroke="#f59e0b" stroke-width="1.5" opacity="0.7" filter="url(#softglow)">
    <line x1="512" y1="248" x2="470" y2="190"/>
    <line x1="512" y1="248" x2="554" y2="190"/>
    <line x1="512" y1="248" x2="450" y2="220"/>
    <line x1="512" y1="248" x2="574" y2="220"/>
    <line x1="512" y1="248" x2="480" y2="170"/>
    <line x1="512" y1="248" x2="544" y2="170"/>
  </g>
  
  <!-- Knowledge nodes connecting - left side (SKILLS cluster) -->
  <g filter="url(#softglow)">
    <!-- Skill node 1 -->
    <rect x="120" y="140" width="80" height="50" rx="8" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5" opacity="0.9"/>
    <text x="160" y="170" font-family="monospace" font-size="11" fill="#38bdf8" text-anchor="middle">SKILL</text>
    
    <!-- Skill node 2 -->
    <rect x="80" y="240" width="80" height="50" rx="8" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5" opacity="0.9"/>
    <text x="120" y="270" font-family="monospace" font-size="11" fill="#38bdf8" text-anchor="middle">SKILL</text>
    
    <!-- Skill node 3 -->
    <rect x="160" y="320" width="80" height="50" rx="8" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5" opacity="0.9"/>
    <text x="200" y="350" font-family="monospace" font-size="11" fill="#38bdf8" text-anchor="middle">SKILL</text>
    
    <!-- Skill node 4 -->
    <rect x="240" y="180" width="80" height="50" rx="8" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5" opacity="0.9"/>
    <text x="280" y="210" font-family="monospace" font-size="11" fill="#38bdf8" text-anchor="middle">SKILL</text>
    
    <!-- Skill node 5 -->
    <rect x="200" y="260" width="80" height="50" rx="8" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5" opacity="0.9"/>
    <text x="240" y="290" font-family="monospace" font-size="11" fill="#38bdf8" text-anchor="middle">SKILL</text>
  </g>
  
  <!-- Connecting lines from skills to forge -->
  <g stroke="#38bdf8" stroke-width="1" opacity="0.4" stroke-dasharray="4,4">
    <line x1="200" y1="165" x2="412" y2="260"/>
    <line x1="160" y1="265" x2="412" y2="280"/>
    <line x1="240" y1="285" x2="412" y2="290"/>
    <line x1="280" y1="205" x2="420" y2="260"/>
    <line x1="200" y1="345" x2="415" y2="320"/>
  </g>
  
  <!-- Knowledge nodes - right side (growing compound results) -->
  <g filter="url(#softglow)">
    <!-- Larger accumulated nodes -->
    <rect x="660" y="120" width="100" height="60" rx="10" fill="#1e3a5f" stroke="#f59e0b" stroke-width="2" opacity="0.9"/>
    <text x="710" y="148" font-family="monospace" font-size="10" fill="#f59e0b" text-anchor="middle">PATTERN</text>
    <text x="710" y="164" font-family="monospace" font-size="8" fill="#d97706" text-anchor="middle">×3 faster</text>
    
    <rect x="740" y="220" width="100" height="60" rx="10" fill="#1e3a5f" stroke="#f59e0b" stroke-width="2" opacity="0.9"/>
    <text x="790" y="248" font-family="monospace" font-size="10" fill="#f59e0b" text-anchor="middle">WORKFLOW</text>
    <text x="790" y="264" font-family="monospace" font-size="8" fill="#d97706" text-anchor="middle">autopilot</text>
    
    <rect x="700" y="330" width="100" height="60" rx="10" fill="#1e3a5f" stroke="#f59e0b" stroke-width="2" opacity="0.9"/>
    <text x="750" y="358" font-family="monospace" font-size="10" fill="#f59e0b" text-anchor="middle">MEMORY</text>
    <text x="750" y="374" font-family="monospace" font-size="8" fill="#d97706" text-anchor="middle">compounding</text>
    
    <rect x="830" y="160" width="100" height="60" rx="10" fill="#1e3a5f" stroke="#22d3ee" stroke-width="1.5" opacity="0.7"/>
    <text x="880" y="188" font-family="monospace" font-size="10" fill="#22d3ee" text-anchor="middle">ITERATE</text>
    <text x="880" y="204" font-family="monospace" font-size="8" fill="#06b6d4" text-anchor="middle">improve</text>
    
    <rect x="850" y="290" width="100" height="60" rx="10" fill="#1e3a5f" stroke="#22d3ee" stroke-width="1.5" opacity="0.7"/>
    <text x="900" y="318" font-family="monospace" font-size="10" fill="#22d3ee" text-anchor="middle">DEPLOY</text>
    <text x="900" y="334" font-family="monospace" font-size="8" fill="#06b6d4" text-anchor="middle">ship fast</text>
  </g>
  
  <!-- Connecting lines from forge to results -->
  <g stroke="#f59e0b" stroke-width="1" opacity="0.5">
    <line x1="612" y1="260" x2="660" y2="150"/>
    <line x1="612" y1="270" x2="740" y2="250"/>
    <line x1="612" y1="290" x2="700" y2="360"/>
    <line x1="612" y1="255" x2="830" y2="190"/>
    <line x1="612" y1="300" x2="850" y2="320"/>
  </g>
  
  <!-- Compounding arrow - upward trajectory -->
  <path d="M 340 420 Q 512 350 700 280 L 880 160" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.6" stroke-dasharray="8,4"/>
  <polygon points="880,160 870,175 885,172" fill="#f59e0b" opacity="0.7"/>
  
  <!-- Zero-shot flat line comparison -->
  <path d="M 340 440 L 600 430 L 880 420" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.4" stroke-dasharray="6,6"/>
  <text x="860" y="445" font-family="monospace" font-size="9" fill="#ef4444" opacity="0.6">zero-shot</text>
  <text x="720" y="235" font-family="monospace" font-size="9" fill="#f59e0b" opacity="0.7">with skills</text>
  
  <!-- Ambient particles/sparks -->
  <g fill="#f59e0b" opacity="0.5">
    <circle cx="380" cy="200" r="1.5"/>
    <circle cx="430" cy="170" r="1"/>
    <circle cx="460" cy="230" r="2"/>
    <circle cx="560" cy="190" r="1.5"/>
    <circle cx="590" cy="230" r="1"/>
    <circle cx="650" cy="200" r="1"/>
    <circle cx="300" cy="380" r="1.5"/>
    <circle cx="340" cy="290" r="1"/>
    <circle cx="490" cy="340" r="2"/>
    <circle cx="550" cy="370" r="1"/>
    <circle cx="630" cy="310" r="1.5"/>
  </g>
  
  <!-- Title area at bottom -->
  <rect x="0" y="490" width="1024" height="86" fill="#0a1628" opacity="0.85"/>
  <line x1="0" y1="490" x2="1024" y2="490" stroke="#d97706" stroke-width="2" opacity="0.6"/>
  <text x="512" y="530" font-family="Arial, sans-serif" font-size="24" fill="#f59e0b" text-anchor="middle" font-weight="bold" filter="url(#softglow)">AI SKILL ACQUISITION</text>
  <text x="512" y="558" font-family="monospace" font-size="14" fill="#94a3b8" text-anchor="middle">How Persistent Knowledge Compounds Past Zero-Shot</text>
</svg>