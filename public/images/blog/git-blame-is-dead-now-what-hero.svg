<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 576">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0d1321"/>
    </linearGradient>
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="576" fill="url(#bg)"/>

  <!-- Forge glow - bottom -->
  <ellipse cx="512" cy="620" rx="500" ry="220" fill="url(#glow)" filter="url(#softglow)" opacity="0.7"/>

  <!-- Tombstone: "git blame" -->
  <rect x="360" y="160" width="180" height="220" rx="8" fill="#1a1f2e" stroke="#374151" stroke-width="2"/>
  <rect x="360" y="140" width="180" height="40" rx="20" fill="#1a1f2e" stroke="#374151" stroke-width="2"/>
  <line x1="400" y1="155" x2="500" y2="155" stroke="#6b7280" stroke-width="1.5" opacity="0.6"/>
  <!-- R.I.P. -->
  <text x="450" y="210" fill="#9ca3af" font-family="monospace" font-size="14" text-anchor="middle" opacity="0.8">R.I.P.</text>
  <text x="450" y="240" fill="#ef4444" font-family="monospace" font-size="16" text-anchor="middle" font-weight="bold">git blame</text>
  <line x1="385" y1="260" x2="515" y2="260" stroke="#374151" stroke-width="1"/>
  <text x="450" y="285" fill="#6b7280" font-family="monospace" font-size="10" text-anchor="middle">line-by-line</text>
  <text x="450" y="300" fill="#6b7280" font-family="monospace" font-size="10" text-anchor="middle">ownership</text>
  <text x="450" y="330" fill="#4b5563" font-family="monospace" font-size="9" text-anchor="middle">2010–2026</text>

  <!-- AI agent figure - right side -->
  <!-- Pulsing glow circle -->
  <circle cx="680" cy="260" r="60" fill="#d97706" opacity="0.08" filter="url(#softglow)"/>
  <circle cx="680" cy="260" r="40" fill="#d97706" opacity="0.12" filter="url(#softglow)"/>
  <!-- Agent head -->
  <circle cx="680" cy="220" r="22" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="672" cy="215" r="2.5" fill="#f59e0b"/>
  <circle cx="688" cy="215" r="2.5" fill="#f59e0b"/>
  <!-- Agent body -->
  <rect x="665" y="244" width="30" height="50" rx="4" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <!-- Code streaming from agent -->
  <text x="720" y="240" fill="#22d3ee" font-family="monospace" font-size="9" opacity="0.7">def resolve()</text>
  <text x="725" y="255" fill="#22d3ee" font-family="monospace" font-size="8" opacity="0.5">+async</text>
  <text x="718" y="270" fill="#22d3ee" font-family="monospace" font-size="9" opacity="0.6">await result</text>
  <text x="730" y="285" fill="#22d3ee" font-family="monospace" font-size="8" opacity="0.4">return ok</text>

  <!-- "Now What?" text - large -->
  <text x="512" y="440" fill="url(#amber)" font-family="sans-serif" font-size="48" text-anchor="middle" font-weight="bold" opacity="0.9">Now What?</text>
  <text x="512" y="470" fill="#9ca3af" font-family="sans-serif" font-size="14" text-anchor="middle" opacity="0.6">ownership in the age of agentic code</text>

  <!-- Spark particles -->
  <circle cx="580" cy="180" r="2" fill="#f59e0b" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="620" cy="300" r="1.5" fill="#f59e0b" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="350" r="2" fill="#ef4444" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.05;0.3" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="740" cy="200" r="1.5" fill="#22d3ee" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Bottom border accent -->
  <rect x="0" y="556" width="1024" height="2" fill="url(#amber)" opacity="0.6"/>
</svg>