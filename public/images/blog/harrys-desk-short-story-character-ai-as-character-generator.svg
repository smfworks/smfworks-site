<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1510;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0f2b32;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="55%" r="55%">
      <stop offset="0%" style="stop-color:#f5b86a;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#f5b86a;stop-opacity:0"/>
    </radialGradient>
    <filter id="paper" x="0" y="0">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.04"/></feComponentTransfer>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" filter="url(#paper)"/>

  <circle cx="600" cy="330" r="300" fill="url(#glowGrad)"/>

  <!-- Desk surface -->
  <path d="M 80 520 L 1120 520 L 1160 630 L 40 630 Z" fill="#241b14" opacity="0.8"/>
  <path d="M 80 520 L 1120 520" stroke="#8a6d4f" stroke-width="2" opacity="0.5"/>

  <!-- Open notebook -->
  <g transform="translate(320, 420)">
    <path d="M 0 0 L 240 20 L 260 150 L 20 130 Z" fill="#f7f1e3" opacity="0.95"/>
    <path d="M 0 0 L 240 20" stroke="#c7b299" stroke-width="1"/>
    <path d="M 20 130 L 260 150" stroke="#c7b299" stroke-width="1"/>
    <path d="M 120 10 L 140 155" stroke="#bfa78a" stroke-width="1.5"/>
    <g opacity="0.55" fill="#3a3a3a">
      <rect x="35" y="35" width="80" height="4" rx="1"/>
      <rect x="35" y="48" width="100" height="3" rx="1"/>
      <rect x="35" y="58" width="90" height="3" rx="1"/>
      <rect x="160" y="40" width="70" height="3" rx="1"/>
      <rect x="160" y="50" width="60" height="3" rx="1"/>
      <rect x="160" y="60" width="85" height="3" rx="1"/>
    </g>
  </g>

  <!-- Antique clock parts -->
  <g transform="translate(700, 440)" opacity="0.9">
    <circle cx="0" cy="0" r="55" fill="none" stroke="#8a6d4f" stroke-width="3"/>
    <circle cx="0" cy="0" r="45" fill="none" stroke="#c7a86e" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="0" y2="-35" stroke="#c7a86e" stroke-width="2"/>
    <line x1="0" y1="0" x2="28" y2="14" stroke="#c7a86e" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="6" fill="#c7a86e"/>
    <circle cx="75" cy="-30" r="18" fill="none" stroke="#8a6d4f" stroke-width="2"/>
    <circle cx="-70" cy="40" r="12" fill="none" stroke="#8a6d4f" stroke-width="2"/>
    <line x1="55" y1="0" x2="75" y2="-12" stroke="#c7a86e" stroke-width="1.5"/>
  </g>

  <!-- Writer's hand / figure (silhouette) -->
  <g transform="translate(150, 240)">
    <ellipse cx="0" cy="90" rx="35" ry="85" fill="#241b14" opacity="0.85"/>
    <circle cx="0" cy="0" r="28" fill="#241b14" opacity="0.85"/>
    <path d="M -18 20 Q -30 70 -10 110 L 10 110 Q 30 70 18 20 Z" fill="#241b14" opacity="0.85"/>
  </g>

  <!-- Character emerging from page -->
  <g transform="translate(920, 270)" opacity="0.65">
    <path d="M 0 0 C 40 -20 70 0 80 40 C 90 80 60 130 20 140 C -20 150 -60 110 -70 70 C -80 30 -50 -10 0 0" fill="none" stroke="#f5b86a" stroke-width="2" stroke-dasharray="6 4"/>
    <circle cx="0" cy="35" r="30" fill="none" stroke="#f5b86a" stroke-width="2" stroke-dasharray="6 4"/>
    <path d="M -25 35 Q 0 55 25 35" fill="none" stroke="#f5b86a" stroke-width="1.5" stroke-dasharray="4 4"/>
    <path d="M -15 80 L -10 140 M 15 80 L 10 140" fill="none" stroke="#f5b86a" stroke-width="1.5" stroke-dasharray="4 4"/>
    <circle cx="-8" cy="28" r="3" fill="#f5b86a" opacity="0.7"/>
    <circle cx="8" cy="28" r="3" fill="#f5b86a" opacity="0.7"/>
  </g>

  <!-- Floating words -->
  <g opacity="0.35" fill="#e6d6bc" font-family="Georgia, serif" font-size="16" font-style="italic">
    <text x="520" y="160">want</text>
    <text x="780" y="190">wound</text>
    <text x="450" y="240">secret</text>
    <text x="680" y="130">contradiction</text>
  </g>

  <text x="600" y="80" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#f5b86a" opacity="0.7" letter-spacing="4">THE ALCHEMY OF LANGUAGE</text>

  <rect x="0" y="480" width="1200" height="150" fill="#0f2b32" opacity="0.8"/>
  <text x="600" y="530" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="30" font-weight="600" fill="#f7f1e3">Short Story — Character</text>
  <text x="600" y="565" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" fill="#f5b86a" opacity="0.85">AI as Character Generator</text>

  <text x="600" y="605" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#e6d6bc" opacity="0.35">
    Harry's Desk — The Alchemy of Language
  </text>
</svg>
