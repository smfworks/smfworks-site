<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d1a2f;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00E5A0;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#00E5A0;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid-attribution" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#00E5A0" stroke-width="0.5" stroke-opacity="0.08"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid-attribution)"/>

  <!-- Central glow -->
  <circle cx="600" cy="315" r="260" fill="url(#glowGrad)"/>

  <!-- Attribution / citation network icon -->
  <g transform="translate(600, 315)" opacity="0.9">
    <!-- Central open book / document node -->
    <rect x="-48" y="-32" width="96" height="64" rx="4" fill="none" stroke="#00E5A0" stroke-width="2.5"/>
    <line x1="0" y1="-32" x2="0" y2="32" stroke="#00E5A0" stroke-width="1.5"/>
    <line x1="-32" y1="-12" x2="-8" y2="-12" stroke="#00E5A0" stroke-width="1.5" opacity="0.7"/>
    <line x1="-32" y1="0" x2="-8" y2="0" stroke="#00E5A0" stroke-width="1.5" opacity="0.7"/>
    <line x1="-32" y1="12" x2="-8" y2="12" stroke="#00E5A0" stroke-width="1.5" opacity="0.7"/>
    <line x1="8" y1="-12" x2="32" y2="-12" stroke="#00E5A0" stroke-width="1.5" opacity="0.7"/>
    <line x1="8" y1="0" x2="32" y2="0" stroke="#00E5A0" stroke-width="1.5" opacity="0.7"/>
    <line x1="8" y1="12" x2="32" y2="12" stroke="#00E5A0" stroke-width="1.5" opacity="0.7"/>

    <!-- Orbiting source nodes -->
    <circle cx="-130" cy="-60" r="14" fill="none" stroke="#00E5A0" stroke-width="2"/>
    <circle cx="130" cy="-60" r="14" fill="none" stroke="#00E5A0" stroke-width="2"/>
    <circle cx="-130" cy="60" r="14" fill="none" stroke="#00E5A0" stroke-width="2"/>
    <circle cx="130" cy="60" r="14" fill="none" stroke="#00E5A0" stroke-width="2"/>
    <circle cx="0" cy="-130" r="14" fill="none" stroke="#00E5A0" stroke-width="2"/>

    <!-- Connection lines -->
    <line x1="-48" y1="-16" x2="-116" y2="-60" stroke="#00E5A0" stroke-width="1.5" opacity="0.6"/>
    <line x1="48" y1="-16" x2="116" y2="-60" stroke="#00E5A0" stroke-width="1.5" opacity="0.6"/>
    <line x1="-48" y1="16" x2="-116" y2="60" stroke="#00E5A0" stroke-width="1.5" opacity="0.6"/>
    <line x1="48" y1="16" x2="116" y2="60" stroke="#00E5A0" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="-32" x2="0" y2="-116" stroke="#00E5A0" stroke-width="1.5" opacity="0.6"/>

    <!-- Quotation marks -->
    <text x="-130" y="-54" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#00E5A0" opacity="0.9">“</text>
    <text x="130" y="-54" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#00E5A0" opacity="0.9">”</text>
    <text x="-130" y="66" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#00E5A0" opacity="0.9">“</text>
    <text x="130" y="66" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#00E5A0" opacity="0.9">”</text>
  </g>

  <!-- Series mark -->
  <text x="600" y="80" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#00E5A0" opacity="0.6" letter-spacing="4">THE ALCHEMY OF LANGUAGE</text>

  <!-- Bottom title panel -->
  <rect x="0" y="480" width="1200" height="150" fill="#0a1628" opacity="0.7"/>
  <text x="600" y="530" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="30" font-weight="600" fill="#ffffff">Attribution, Disclosure, and the New Citation</text>
  <text x="600" y="565" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" fill="#00E5A0" opacity="0.7">When the co-author is statistical, citation must change</text>

  <!-- SMF Works mark -->
  <text x="600" y="605" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#ffffff" opacity="0.35">
    Harry's Desk — The Alchemy of Language
  </text>
</svg>
