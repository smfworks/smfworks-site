<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 576">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0d1321"/>
    </linearGradient>
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="576" fill="url(#bg)"/>
  
  <!-- Forge glow - bottom center -->
  <ellipse cx="512" cy="600" rx="400" ry="200" fill="url(#glow)" filter="url(#softglow)" opacity="0.6"/>
  
  <!-- Token blocks - left side (overflowing) -->
  <g opacity="0.7">
    <!-- Overflow stack -->
    <rect x="120" y="280" width="80" height="24" rx="3" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
    <rect x="120" y="308" width="80" height="24" rx="3" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
    <rect x="120" y="336" width="80" height="24" rx="3" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
    <rect x="120" y="364" width="80" height="24" rx="3" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
    <rect x="120" y="392" width="80" height="24" rx="3" fill="#ef4444" stroke="#f87171" stroke-width="1"/>
    <rect x="130" y="420" width="80" height="24" rx="3" fill="#ef4444" stroke="#f87171" stroke-width="1"/>
    <rect x="140" y="448" width="80" height="24" rx="3" fill="#ef4444" stroke="#f87171" stroke-width="1" opacity="0.7"/>
  </g>
  
  <!-- Budget bar - center -->
  <g>
    <!-- Background bar -->
    <rect x="300" y="200" width="424" height="176" rx="8" fill="#111827" stroke="#1e3a5f" stroke-width="2"/>
    
    <!-- Bar label -->
    <text x="512" y="185" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="14" letter-spacing="3">TOKEN BUDGET</text>
    
    <!-- Used section -->
    <rect x="316" y="220" width="260" height="28" rx="4" fill="url(#amber)" opacity="0.85"/>
    <text x="446" y="240" text-anchor="middle" fill="#0a0e1a" font-family="monospace" font-size="13" font-weight="bold">87% USED</text>
    
    <!-- Remaining section -->
    <rect x="576" y="220" width="140" height="28" rx="4" fill="#1e3a5f" opacity="0.6"/>
    <text x="646" y="240" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="12">13%</text>
    
    <!-- Overflow warning -->
    <rect x="316" y="260" width="396" height="2" fill="#334155" opacity="0.3"/>
    
    <!-- Context blocks visualization -->
    <rect x="316" y="275" width="120" height="20" rx="3" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.5" opacity="0.4"/>
    <text x="376" y="289" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">system prompt</text>
    
    <rect x="316" y="300" width="280" height="20" rx="3" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.5" opacity="0.5"/>
    <text x="456" y="314" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">conversation history</text>
    
    <rect x="316" y="325" width="60" height="20" rx="3" fill="#d97706" stroke="#f59e0b" stroke-width="0.5" opacity="0.6"/>
    <text x="346" y="339" text-anchor="middle" fill="#0a0e1a" font-family="monospace" font-size="10">tools</text>
    
    <rect x="381" y="325" width="80" height="20" rx="3" fill="#d97706" stroke="#f59e0b" stroke-width="0.5" opacity="0.7"/>
    <text x="421" y="339" text-anchor="middle" fill="#0a0e1a" font-family="monospace" font-size="10">skills</text>
    
    <rect x="466" y="325" width="30" height="20" rx="3" fill="#ef4444" stroke="#f87171" stroke-width="0.5" opacity="0.5"/>
    
    <!-- Compression arrow -->
    <path d="M 580 300 L 620 300" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="630" y="304" fill="#f59e0b" font-family="monospace" font-size="10">compress</text>
  </g>
  
  <!-- Overflow icon - left -->
  <g transform="translate(130, 240)" opacity="0.5">
    <path d="M 0 20 L 20 0 L 40 20" stroke="#ef4444" stroke-width="2" fill="none"/>
    <text x="20" y="38" text-anchor="middle" fill="#ef4444" font-family="monospace" font-size="10">OVERFLOW</text>
  </g>
  
  <!-- Compressed output - right side -->
  <g transform="translate(750, 260)" opacity="0.8">
    <rect x="0" y="0" width="120" height="60" rx="6" fill="#111827" stroke="#d97706" stroke-width="1.5"/>
    <text x="60" y="22" text-anchor="middle" fill="#f59e0b" font-family="monospace" font-size="11" font-weight="bold">COMPRESSED</text>
    <text x="60" y="38" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="9">85% → 15%</text>
    <text x="60" y="52" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">room reclaimed</text>
  </g>
  
  <!-- Forge sparks -->
  <g filter="url(#blur)" opacity="0.8">
    <circle cx="460" cy="420" r="2" fill="#f59e0b"/>
    <circle cx="530" cy="440" r="1.5" fill="#d97706"/>
    <circle cx="500" cy="430" r="1" fill="#fbbf24"/>
    <circle cx="480" cy="445" r="2" fill="#f59e0b"/>
    <circle cx="545" cy="425" r="1.5" fill="#fbbf24"/>
  </g>
  
  <!-- Anvil silhouette -->
  <g transform="translate(430, 500)" opacity="0.3">
    <path d="M 0 0 L 160 0 L 160 10 L 120 10 L 120 30 L 140 50 L 20 50 L 40 30 L 40 10 L 0 10 Z" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  </g>
  
  <!-- Title -->
  <text x="512" y="120" text-anchor="middle" fill="#f59e0b" font-family="system-ui, sans-serif" font-size="36" font-weight="bold" letter-spacing="2">CONTEXT IS MONEY</text>
  <text x="512" y="152" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="16" letter-spacing="1">Managing Your Token Budget Like a CTO Manages Runway</text>
  
  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="#3b82f6" stroke-width="0.5">
    <line x1="0" y1="100" x2="1024" y2="100"/>
    <line x1="0" y1="200" x2="1024" y2="200"/>
    <line x1="0" y1="300" x2="1024" y2="300"/>
    <line x1="0" y1="400" x2="1024" y2="400"/>
    <line x1="0" y1="500" x2="1024" y2="500"/>
  </g>
  
  <!-- Dollar sign made of code brackets -->
  <g transform="translate(512, 40)" opacity="0.15">
    <text y="30" text-anchor="middle" fill="#f59e0b" font-family="monospace" font-size="60">{</text>
  </g>
</svg>