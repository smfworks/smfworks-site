    <path d="M -160 -100 L 160 -100 L 80 100 L -80 100 Z" fill="none" stroke="#00E5A0" stroke-width="2.5" opacity="0.7"/>
    <circle cx="-120" cy="-120" r="8" fill="#00E5A0" opacity="0.5"/>
    <circle cx="-70" cy="-125" r="8" fill="#00E5A0" opacity="0.5"/>
    <circle cx="0" cy="-130" r="8" fill="#00E5A0" opacity="0.5"/>
    <circle cx="70" cy="-125" r="8" fill="#00E5A0" opacity="0.5"/>
    <circle cx="120" cy="-120" r="8" fill="#00E5A0" opacity="0.5"/>
    <circle cx="0" cy="130" r="18" fill="#00E5A0" opacity="0.9"/>
