<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0F1F"/>
      <stop offset="50%" stop-color="#001F3F"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </linearGradient>
    <radialGradient id="pulse" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#00E5A0" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#00E5A0" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid overlay -->
  <g opacity="0.03" stroke="#00E5A0">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Pulse circle behind icon -->
  <circle cx="220" cy="315" r="185" fill="url(#pulse)"/>

  <!-- Medical / AI diagnostics icon: cross + circuit nodes + crack motif -->
  <g transform="translate(220,315)" filter="url(#glow)">
    <!-- Medical cross outline -->
    <rect x="-10" y="-62" width="20" height="124" rx="4" fill="none" stroke="#00E5A0" stroke-width="3"/>
    <rect x="-62" y="-10" width="124" height="20" rx="4" fill="none" stroke="#00E5A0" stroke-width="3"/>

    <!-- Central neural / diagnostic node -->
    <circle cx="0" cy="0" r="14" fill="#00E5A0" fill-opacity="0.12" stroke="#00E5A0" stroke-width="2"/>
    <circle cx="0" cy="0" r="5" fill="#00E5A0"/>

    <!-- Circuit branches to node rings representing fragmented systems -->
    <path d="M 0,-62 L 0,-95" stroke="#00E5A0" stroke-width="1.5" fill="none" opacity="0.6"/>
    <circle cx="0" cy="-95" r="4" fill="#00E5A0" opacity="0.8"/>

    <path d="M 62,0 L 95,0" stroke="#00E5A0" stroke-width="1.5" fill="none" opacity="0.6"/>
    <circle cx="95" cy="0" r="4" fill="#00E5A0" opacity="0.8"/>

    <path d="M 0,62 L 0,95" stroke="#00E5A0" stroke-width="1.5" fill="none" opacity="0.6"/>
    <circle cx="0" cy="95" r="4" fill="#00E5A0" opacity="0.8"/>

    <path d="M -62,0 L -95,0" stroke="#00E5A0" stroke-width="1.5" fill="none" opacity="0.6"/>
    <circle cx="-95" cy="0" r="4" fill="#00E5A0" opacity="0.8"/>

    <!-- Diagonal branches suggesting convergence -->
    <path d="M 45,-45 L 72,-72" stroke="#00E5A0" stroke-width="1.5" fill="none" opacity="0.4"/>
    <circle cx="72" cy="-72" r="3" fill="#00E5A0" opacity="0.6"/>

    <path d="M -45,-45 L -72,-72" stroke="#00E5A0" stroke-width="1.5" fill="none" opacity="0.4"/>
    <circle cx="-72" cy="-72" r="3" fill="#00E5A0" opacity="0.6"/>

    <path d="M 45,45 L 72,72" stroke="#00E5A0" stroke-width="1.5" fill="none" opacity="0.4"/>
    <circle cx="72" cy="72" r="3" fill="#00E5A0" opacity="0.6"/>

    <path d="M -45,45 L -72,72" stroke="#00E5A0" stroke-width="1.5" fill="none" opacity="0.4"/>
    <circle cx="-72" cy="72" r="3" fill="#00E5A0" opacity="0.6"/>
  </g>

  <!-- Right-side circuit decorations -->
  <g opacity="0.04" stroke="#00E5A0" stroke-width="1.5" fill="none">
    <path d="M 850,80 L 980,80 L 980,180 L 1120,180"/>
    <path d="M 900,130 L 1050,130"/>
    <circle cx="1120" cy="180" r="3.5" fill="#00E5A0" fill-opacity="0.3" stroke="none"/>
    <circle cx="1050" cy="130" r="2.5" fill="#00E5A0" fill-opacity="0.3" stroke="none"/>
    <path d="M 820,420 L 920,420 L 920,520 L 1080,520"/>
    <circle cx="1080" cy="520" r="3" fill="#00E5A0" fill-opacity="0.3" stroke="none"/>
    <path d="M 880,360 L 1020,360 L 1020,290 L 1140,290"/>
    <circle cx="1140" cy="290" r="3" fill="#00E5A0" fill-opacity="0.3" stroke="none"/>
  </g>

  <!-- Title -->
  <text x="440" y="240" fill="#E2E8F0" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="bold" letter-spacing="-0.5">
    What Still Breaks
  </text>
  <text x="440" y="285" fill="#E2E8F0" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="bold" letter-spacing="-0.5">
    and Why Design Gaps Matter
  </text>

  <!-- Subtitle -->
  <text x="440" y="333" fill="#00E5A0" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="400" letter-spacing="2">
    OPENCLAW + HERMES DIAGNOSTICS
  </text>

  <!-- Divider -->
  <line x1="440" y1="355" x2="780" y2="355" stroke="#00E5A0" stroke-width="1.5" opacity="0.25"/>

  <!-- Tagline -->
  <text x="440" y="390" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="400">
    A Dr J infrastructure diagnosis — June 26, 2026
  </text>

  <!-- Bottom accent bar -->
  <rect x="0" y="627" width="1200" height="3" fill="#00E5A0" opacity="0.4"/>
</svg>