<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1a2f;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00E5A0;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#00E5A0;stop-opacity:0" />
    </radialGradient>
    <linearGradient id="leftBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5A0;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00E5A0;stop-opacity:0.2" />
    </linearGradient>
    <linearGradient id="rightBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A9EFF;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#4A9EFF;stop-opacity:0.2" />
    </linearGradient>
    <linearGradient id="convergeGrad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#00E5A0;stop-opacity:0.9" />
      <stop offset="50%" style="stop-color:#7B61FF;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#4A9EFF;stop-opacity:0.9" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#00E5A0" stroke-width="0.5" stroke-opacity="0.06"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Center convergence glow -->
  <ellipse cx="600" cy="315" rx="400" ry="250" fill="url(#centerGlow)"/>

  <!-- LEFT SIDE: OpenClaw platform (teal) -->
  <g transform="translate(80, 100)">
    <!-- Platform label -->
    <text x="90" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#00E5A0" text-anchor="middle" letter-spacing="2">OPENCLAW</text>

    <!-- Server rack -->
    <rect x="0" y="20" width="180" height="420" rx="4" fill="none" stroke="#00E5A0" stroke-width="1.5" opacity="0.5"/>

    <!-- Server units with teal indicators -->
    <g transform="translate(10, 30)">
      <!-- Unit 1: Healthy -->
      <rect x="0" y="0" width="160" height="38" rx="2" fill="none" stroke="#00E5A0" stroke-width="1" opacity="0.6"/>
      <circle cx="15" cy="19" r="5" fill="#00E5A0"/>
      <rect x="30" y="14" width="80" height="10" rx="2" fill="url(#leftBar)" opacity="0.7"/>
      <text x="120" y="23" font-family="monospace" font-size="9" fill="#00E5A0" opacity="0.8">OK</text>

      <!-- Unit 2: Healthy -->
      <rect x="0" y="52" width="160" height="38" rx="2" fill="none" stroke="#00E5A0" stroke-width="1" opacity="0.5"/>
      <circle cx="15" cy="71" r="5" fill="#00E5A0" opacity="0.7"/>
      <rect x="30" y="66" width="65" height="10" rx="2" fill="url(#leftBar)" opacity="0.5"/>
      <text x="120" y="75" font-family="monospace" font-size="9" fill="#00E5A0" opacity="0.6">OK</text>

      <!-- Unit 3: Warning -->
      <rect x="0" y="104" width="160" height="38" rx="2" fill="none" stroke="#00E5A0" stroke-width="1" opacity="0.4"/>
      <circle cx="15" cy="123" r="5" fill="#FFB020"/>
      <rect x="30" y="118" width="90" height="10" rx="2" fill="#FFB020" opacity="0.3"/>
      <text x="120" y="127" font-family="monospace" font-size="9" fill="#FFB020" opacity="0.8">WARN</text>

      <!-- Unit 4: Healthy -->
      <rect x="0" y="156" width="160" height="38" rx="2" fill="none" stroke="#00E5A0" stroke-width="1" opacity="0.5"/>
      <circle cx="15" cy="175" r="5" fill="#00E5A0" opacity="0.6"/>
      <rect x="30" y="170" width="55" height="10" rx="2" fill="url(#leftBar)" opacity="0.4"/>
      <text x="120" y="179" font-family="monospace" font-size="9" fill="#00E5A0" opacity="0.6">OK</text>

      <!-- Unit 5: Critical -->
      <rect x="0" y="208" width="160" height="38" rx="2" fill="none" stroke="#FF4444" stroke-width="1" opacity="0.6"/>
      <circle cx="15" cy="227" r="5" fill="#FF4444"/>
      <rect x="30" y="222" width="100" height="10" rx="2" fill="#FF4444" opacity="0.4"/>
      <text x="120" y="231" font-family="monospace" font-size="9" fill="#FF4444" opacity="0.9">FAIL</text>

      <!-- Unit 6: Healthy -->
      <rect x="0" y="260" width="160" height="38" rx="2" fill="none" stroke="#00E5A0" stroke-width="1" opacity="0.5"/>
      <circle cx="15" cy="279" r="5" fill="#00E5A0" opacity="0.7"/>
      <rect x="30" y="274" width="72" height="10" rx="2" fill="url(#leftBar)" opacity="0.5"/>
      <text x="120" y="283" font-family="monospace" font-size="9" fill="#00E5A0" opacity="0.6">OK</text>

      <!-- Unit 7: Healthy -->
      <rect x="0" y="312" width="160" height="38" rx="2" fill="none" stroke="#00E5A0" stroke-width="1" opacity="0.4"/>
      <circle cx="15" cy="331" r="5" fill="#00E5A0" opacity="0.5"/>
      <rect x="30" y="326" width="48" height="10" rx="2" fill="url(#leftBar)" opacity="0.3"/>
      <text x="120" y="335" font-family="monospace" font-size="9" fill="#00E5A0" opacity="0.5">OK</text>

      <!-- Memory bar -->
      <rect x="0" y="365" width="160" height="8" rx="4" fill="#00E5A0" opacity="0.15"/>
      <rect x="0" y="365" width="112" height="8" rx="4" fill="#00E5A0" opacity="0.5"/>
      <text x="165" y="373" font-family="monospace" font-size="8" fill="#00E5A0" opacity="0.7">70%</text>
    </g>
  </g>

  <!-- RIGHT SIDE: Hermes platform (blue) -->
  <g transform="translate(940, 100)">
    <!-- Platform label -->
    <text x="90" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#4A9EFF" text-anchor="middle" letter-spacing="2">HERMES</text>

    <!-- Server rack -->
    <rect x="0" y="20" width="180" height="420" rx="4" fill="none" stroke="#4A9EFF" stroke-width="1.5" opacity="0.5"/>

    <!-- Server units with blue indicators -->
    <g transform="translate(10, 30)">
      <!-- Unit 1: Healthy -->
      <rect x="0" y="0" width="160" height="38" rx="2" fill="none" stroke="#4A9EFF" stroke-width="1" opacity="0.6"/>
      <circle cx="15" cy="19" r="5" fill="#4A9EFF"/>
      <rect x="30" y="14" width="75" height="10" rx="2" fill="url(#rightBar)" opacity="0.7"/>
      <text x="120" y="23" font-family="monospace" font-size="9" fill="#4A9EFF" opacity="0.8">OK</text>

      <!-- Unit 2: Warning -->
      <rect x="0" y="52" width="160" height="38" rx="2" fill="none" stroke="#FFB020" stroke-width="1" opacity="0.6"/>
      <circle cx="15" cy="71" r="5" fill="#FFB020"/>
      <rect x="30" y="66" width="95" height="10" rx="2" fill="#FFB020" opacity="0.4"/>
      <text x="120" y="75" font-family="monospace" font-size="9" fill="#FFB020" opacity="0.8">WARN</text>

      <!-- Unit 3: Healthy -->
      <rect x="0" y="104" width="160" height="38" rx="2" fill="none" stroke="#4A9EFF" stroke-width="1" opacity="0.5"/>
      <circle cx="15" cy="123" r="5" fill="#4A9EFF" opacity="0.7"/>
      <rect x="30" y="118" width="60" height="10" rx="2" fill="url(#rightBar)" opacity="0.5"/>
      <text x="120" y="127" font-family="monospace" font-size="9" fill="#4A9EFF" opacity="0.6">OK</text>

      <!-- Unit 4: Healthy -->
      <rect x="0" y="156" width="160" height="38" rx="2" fill="none" stroke="#4A9EFF" stroke-width="1" opacity="0.5"/>
      <circle cx="15" cy="175" r="5" fill="#4A9EFF" opacity="0.6"/>
      <rect x="30" y="170" width="82" height="10" rx="2" fill="url(#rightBar)" opacity="0.5"/>
      <text x="120" y="179" font-family="monospace" font-size="9" fill="#4A9EFF" opacity="0.6">OK</text>

      <!-- Unit 5: Healthy -->
      <rect x="0" y="208" width="160" height="38" rx="2" fill="none" stroke="#4A9EFF" stroke-width="1" opacity="0.5"/>
      <circle cx="15" cy="227" r="5" fill="#4A9EFF" opacity="0.7"/>
      <rect x="30" y="222" width="68" height="10" rx="2" fill="url(#rightBar)" opacity="0.6"/>
      <text x="120" y="231" font-family="monospace" font-size="9" fill="#4A9EFF" opacity="0.6">OK</text>

      <!-- Unit 6: Critical -->
      <rect x="0" y="260" width="160" height="38" rx="2" fill="none" stroke="#FF4444" stroke-width="1" opacity="0.6"/>
      <circle cx="15" cy="279" r="5" fill="#FF4444"/>
      <rect x="30" y="274" width="88" height="10" rx="2" fill="#FF4444" opacity="0.4"/>
      <text x="120" y="283" font-family="monospace" font-size="9" fill="#FF4444" opacity="0.9">FAIL</text>

      <!-- Unit 7: Healthy -->
      <rect x="0" y="312" width="160" height="38" rx="2" fill="none" stroke="#4A9EFF" stroke-width="1" opacity="0.4"/>
      <circle cx="15" cy="331" r="5" fill="#4A9EFF" opacity="0.5"/>
      <rect x="30" y="326" width="52" height="10" rx="2" fill="url(#rightBar)" opacity="0.3"/>
      <text x="120" y="335" font-family="monospace" font-size="9" fill="#4A9EFF" opacity="0.5">OK</text>

      <!-- Memory bar -->
      <rect x="0" y="365" width="160" height="8" rx="4" fill="#4A9EFF" opacity="0.15"/>
      <rect x="0" y="365" width="128" height="8" rx="4" fill="#4A9EFF" opacity="0.5"/>
      <text x="165" y="373" font-family="monospace" font-size="8" fill="#4A9EFF" opacity="0.7">80%</text>
    </g>
  </g>

  <!-- CENTER: Convergence hub -->
  <g transform="translate(600, 315)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="130" fill="none" stroke="url(#convergeGrad)" stroke-width="2" opacity="0.3"/>
    <!-- Middle ring -->
    <circle cx="0" cy="0" r="95" fill="none" stroke="url(#convergeGrad)" stroke-width="2" opacity="0.5"/>
    <!-- Inner ring -->
    <circle cx="0" cy="0" r="60" fill="none" stroke="url(#convergeGrad)" stroke-width="2" opacity="0.7"/>

    <!-- Center hexagon / diagnostic symbol -->
    <polygon points="0,-40 35,-20 35,20 0,40 -35,20 -35,-20" fill="none" stroke="url(#convergeGrad)" stroke-width="2" opacity="0.9"/>
    <polygon points="0,-28 24,-14 24,14 0,28 -24,14 -24,-14" fill="url(#convergeGrad)" opacity="0.15"/>

    <!-- Cross lines in center -->
    <line x1="-20" y1="0" x2="20" y2="0" stroke="#00E5A0" stroke-width="2" opacity="0.9"/>
    <line x1="0" y1="-20" x2="0" y2="20" stroke="#4A9EFF" stroke-width="2" opacity="0.9"/>

    <!-- Pulse dots on rings -->
    <circle cx="95" cy="0" r="4" fill="#00E5A0" opacity="0.8"/>
    <circle cx="-95" cy="0" r="4" fill="#4A9EFF" opacity="0.8"/>
    <circle cx="47" cy="-82" r="3" fill="#7B61FF" opacity="0.7"/>
    <circle cx="-47" cy="82" r="3" fill="#7B61FF" opacity="0.7"/>

    <!-- Label -->
    <text x="0" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#00E5A0" text-anchor="middle" letter-spacing="1" opacity="0.9">CONVERGENCE</text>
    <text x="0" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#4A9EFF" text-anchor="middle" letter-spacing="1" opacity="0.9">HUB</text>
  </g>

  <!-- CONVERGENCE DATA FLOWS (left to center) -->
  <!-- Teal streams -->
  <path d="M 270 220 Q 400 200 470 280" fill="none" stroke="#00E5A0" stroke-width="1.5" opacity="0.4" stroke-dasharray="6,4"/>
  <path d="M 270 310 Q 400 310 470 310" fill="none" stroke="#00E5A0" stroke-width="2" opacity="0.6"/>
  <path d="M 270 400 Q 400 420 470 350" fill="none" stroke="#00E5A0" stroke-width="1.5" opacity="0.4" stroke-dasharray="6,4"/>

  <!-- Blue streams -->
  <path d="M 930 220 Q 800 200 730 280" fill="none" stroke="#4A9EFF" stroke-width="1.5" opacity="0.4" stroke-dasharray="6,4"/>
  <path d="M 930 310 Q 800 310 730 310" fill="none" stroke="#4A9EFF" stroke-width="2" opacity="0.6"/>
  <path d="M 930 400 Q 800 420 730 350" fill="none" stroke="#4A9EFF" stroke-width="1.5" opacity="0.4" stroke-dasharray="6,4"/>

  <!-- Bus labels -->
  <text x="600" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#7B61FF" text-anchor="middle" letter-spacing="1.5" opacity="0.8">DIAGNOSTIC BUS</text>
  <line x1="380" y1="186" x2="480" y2="186" stroke="#7B61FF" stroke-width="1" opacity="0.4"/>
  <line x1="720" y1="186" x2="820" y2="186" stroke="#7B61FF" stroke-width="1" opacity="0.4"/>

  <!-- Bottom: Unified Health Schema bar -->
  <g transform="translate(200, 545)">
    <rect x="0" y="0" width="800" height="50" rx="6" fill="#00E5A0" opacity="0.05" stroke="#00E5A0" stroke-width="1" opacity="0.3"/>
    <text x="400" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#E2E8F0" text-anchor="middle" letter-spacing="1">UNIFIED HEALTH SCHEMA</text>
    <text x="400" y="40" font-family="monospace" font-size="10" fill="#94A3B8" text-anchor="middle" letter-spacing="0.5">{ platform, uptime, session, memory, tools, cron, errors }</text>
  </g>

  <!-- Corner accent marks -->
  <line x1="20" y1="20" x2="50" y2="20" stroke="#00E5A0" stroke-width="2" opacity="0.4"/>
  <line x1="20" y1="20" x2="20" y2="50" stroke="#00E5A0" stroke-width="2" opacity="0.4"/>
  <line x1="1180" y1="20" x2="1150" y2="20" stroke="#4A9EFF" stroke-width="2" opacity="0.4"/>
  <line x1="1180" y1="20" x2="1180" y2="50" stroke="#4A9EFF" stroke-width="2" opacity="0.4"/>
  <line x1="20" y1="610" x2="50" y2="610" stroke="#00E5A0" stroke-width="2" opacity="0.4"/>
  <line x1="20" y1="610" x2="20" y2="580" stroke="#00E5A0" stroke-width="2" opacity="0.4"/>
  <line x1="1180" y1="610" x2="1150" y2="610" stroke="#4A9EFF" stroke-width="2" opacity="0.4"/>
  <line x1="1180" y1="610" x2="1180" y2="580" stroke="#4A9EFF" stroke-width="2" opacity="0.4"/>
</svg>
