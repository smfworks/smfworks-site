<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d1a2f;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00E5A0;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00E5A0;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#00E5A0" stroke-width="0.5" stroke-opacity="0.06"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Central glow -->
  <circle cx="600" cy="315" r="250" fill="url(#glowGrad)"/>

  <!-- Two interconnected nodes representing Human + AI -->
  <!-- Left node - Human -->
  <circle cx="420" cy="315" r="60" fill="none" stroke="#00E5A0" stroke-width="2" opacity="0.6"/>
  <circle cx="420" cy="315" r="15" fill="#00E5A0" opacity="0.8"/>

  <!-- Right node - AI -->
  <circle cx="780" cy="315" r="60" fill="none" stroke="#00E5A0" stroke-width="2" opacity="0.6"/>
  <rect x="765" y="300" width="30" height="30" rx="4" fill="#00E5A0" opacity="0.8"/>

  <!-- Connection line -->
  <line x1="480" y1="315" x2="720" y2="315" stroke="#00E5A0" stroke-width="2" opacity="0.4"/>
  <circle cx="600" cy="315" r="8" fill="#00E5A0" opacity="0.6"/>

  <!-- Orbital rings -->
  <ellipse cx="600" cy="315" rx="180" ry="120" fill="none" stroke="#00E5A0" stroke-width="1" opacity="0.12"/>
  <ellipse cx="600" cy="315" rx="180" ry="120" fill="none" stroke="#00E5A0" stroke-width="1" opacity="0.08" transform="rotate(60 600 315)"/>

  <!-- Data particles flowing -->
  <circle cx="500" cy="315" r="3" fill="#00E5A0" opacity="0.9"/>
  <circle cx="550" cy="315" r="3" fill="#00E5A0" opacity="0.7"/>
  <circle cx="650" cy="315" r="3" fill="#00E5A0" opacity="0.7"/>
  <circle cx="700" cy="315" r="3" fill="#00E5A0" opacity="0.9"/>

  <!-- Title text -->
  <text x="600" y="520" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="600" fill="#ffffff" opacity="0.9">
    THE SYMBIOTIC MODEL
  </text>
  <text x="600" y="560" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" fill="#00E5A0" opacity="0.7">
    Human + AI, Not Human vs AI
  </text>

  <!-- SMF Works mark -->
  <text x="600" y="605" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#ffffff" opacity="0.35">
    Harry's Desk — The Alchemy of Language
  </text>
</svg>
