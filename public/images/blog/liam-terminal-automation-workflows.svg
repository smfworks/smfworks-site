<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0D1117"/>
  
  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1A202C" stroke-width="1"/>
    </pattern>
    
    <!-- Gradients -->
    <linearGradient id="terminalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1F2E"/>
      <stop offset="100%" style="stop-color:#0D1117"/>
    </linearGradient>
    
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B00"/>
      <stop offset="100%" style="stop-color:#FF8C42"/>
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Main terminal window -->
  <g transform="translate(100, 80)">
    <!-- Terminal container -->
    <rect x="0" y="0" width="700" height="470" rx="8" fill="url(#terminalGradient)" stroke="#30363D" stroke-width="2"/>
    
    <!-- Terminal header -->
    <rect x="0" y="0" width="700" height="36" rx="8" fill="#161B22"/>
    <rect x="0" y="20" width="700" height="16" fill="#161B22"/>
    
    <!-- Window controls -->
    <circle cx="28" cy="18" r="6" fill="#FF5F56"/>
    <circle cx="50" cy="18" r="6" fill="#FFBD2E"/>
    <circle cx="72" cy="18" r="6" fill="#27CA40"/>
    
    <!-- Terminal title -->
    <text x="350" y="22" text-anchor="middle" fill="#8B949E" font-family="monospace" font-size="13">liam@terminal:~/workflows</text>
    
    <!-- Terminal content -->
    <text x="20" y="65" fill="#FF6B00" font-family="monospace" font-size="14" filter="url(#glow)">$</text>
    <text x="40" y="65" fill="#E6EDF3" font-family="monospace" font-size="14">hermes execute workflow:deploy-staging</text>
    
    <text x="20" y="95" fill="#7EE787" font-family="monospace" font-size="13">[1/5] git checkout staging... ✓</text>
    <text x="20" y="120" fill="#7EE787" font-family="monospace" font-size="13">[2/5] npm test... ✓ (142 passed)</text>
    <text x="20" y="145" fill="#7EE787" font-family="monospace" font-size="13">[3/5] npm run build... ✓</text>
    <text x="20" y="170" fill="#FFA657" font-family="monospace" font-size="13">[4/5] Deploying to staging... ✓</text>
    <text x="20" y="195" fill="#7EE787" font-family="monospace" font-size="13">[5/5] Health check... ✓ (200 OK)</text>
    
    <text x="20" y="235" fill="#58A6FF" font-family="monospace" font-size="13">✓ Workflow completed in 2m 14s</text>
    
    <text x="20" y="290" fill="#FF6B00" font-family="monospace" font-size="14" filter="url(#glow)">$</text>
    <text x="40" y="290" fill="#E6EDF3" font-family="monospace" font-size="14">hermes watch logs --pattern="ERROR"</text>
    
    <text x="20" y="320" fill="#8B949E" font-family="monospace" font-size="13">Monitoring logs... (Ctrl+C to stop)</text>
    
    <!-- Floating automation nodes -->
    <g transform="translate(750, 80)">
      <!-- Node 1 -->
      <rect x="0" y="0" width="140" height="50" rx="6" fill="#161B22" stroke="#FF6B00" stroke-width="2"/>
      <text x="70" y="20" text-anchor="middle" fill="#FF6B00" font-family="monospace" font-size="11">BATCH</text>
      <text x="70" y="38" text-anchor="middle" fill="#E6EDF3" font-family="monospace" font-size="10">rename-files.py</text>
      
      <!-- Connection line -->
      <path d="M0 25 L-30 25" stroke="#FF6B00" stroke-width="1.5" stroke-dasharray="4,2"/>
      
      <!-- Node 2 -->
      <rect x="0" y="100" width="140" height="50" rx="6" fill="#161B22" stroke="#58A6FF" stroke-width="2"/>
      <text x="70" y="120" text-anchor="middle" fill="#58A6FF" font-family="monospace" font-size="11">PARALLEL</text>
      <text x="70" y="138" text-anchor="middle" fill="#E6EDF3" font-family="monospace" font-size="10">test-suites.sh</text>
      
      <!-- Connection -->
      <path d="M70 50 L70 75 L-50 75 L-50 25" stroke="#58A6FF" stroke-width="1.5" fill="none" stroke-dasharray="4,2"/>
      
      <!-- Node 3 -->
      <rect x="0" y="200" width="140" height="50" rx="6" fill="#161B22" stroke="#7EE787" stroke-width="2"/>
      <text x="70" y="220" text-anchor="middle" fill="#7EE787" font-family="monospace" font-size="11">WATCH</text>
      <text x="70" y="238" text-anchor="middle" fill="#E6EDF3" font-family="monospace" font-size="10">log-monitor.py</text>
      
      <!-- Connection -->
      <path d="M70 150 L70 175 L-50 175 L-50 125" stroke="#7EE787" stroke-width="1.5" fill="none" stroke-dasharray="4,2"/>
      
      <!-- Node 4 -->
      <rect x="0" y="300" width="140" height="50" rx="6" fill="#161B22" stroke="#FFA657" stroke-width="2"/>
      <text x="70" y="320" text-anchor="middle" fill="#FFA657" font-family="monospace" font-size="11">DEPLOY</text>
      <text x="70" y="338" text-anchor="middle" fill="#E6EDF3" font-family="monospace" font-size="10">pipeline.py</text>
      
      <!-- Connection -->
      <path d="M70 250 L70 275 L-50 275 L-50 225" stroke="#FFA657" stroke-width="1.5" fill="none" stroke-dasharray="4,2"/>
    </g>
    
    <!-- Status indicators -->
    <g transform="translate(920, 150)">
      <rect x="0" y="0" width="160" height="180" rx="6" fill="#161B22" stroke="#30363D" stroke-width="1"/>
      <text x="80" y="25" text-anchor="middle" fill="#E6EDF3" font-family="monospace" font-size="12">ACTIVE SESSIONS</text>
      
      <text x="15" y="55" fill="#7EE787" font-family="monospace" font-size="11">● session-7a2f</text>
      <text x="15" y="80" fill="#58A6FF" font-family="monospace" font-size="11">● session-4b91</text>
      <text x="15" y="105" fill="#FFA657" font-family="monospace" font-size="11">● session-9e3d</text>
      <text x="15" y="130" fill="#8B949E" font-family="monospace" font-size="11">○ session-1c4a</text>
      
      <text x="15" y="160" fill="#FF6B00" font-family="monospace" font-size="10">3 RUNNING</text>
    </g>
  </g>
  
  <!-- Decorative elements -->
  <g id="bottom-accent" transform="translate(0, 590)">
    <rect x="0" y="0" width="1200" height="40" fill="url(#accentGradient)"/>
  </g>
  
  <!-- Title area -->
  <text x="60" y="540" fill="#E6EDF3" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="600">Terminal Automation Workflows</text>
  <text x="60" y="570" fill="#8B949E" font-family="monospace" font-size="16">liams-landing · hermes ai · automation</text>
</svg>