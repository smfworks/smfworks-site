<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1a2f;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="pulseGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00E5A0;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#00E5A0;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Decorative grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#00E5A0" stroke-width="0.5" stroke-opacity="0.1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Left side: Watchdog eye/medical monitoring icon -->
  <!-- Outer pulse rings -->
  <circle cx="220" cy="315" r="180" fill="none" stroke="#00E5A0" stroke-width="1" stroke-opacity="0.15"/>
  <circle cx="220" cy="315" r="150" fill="none" stroke="#00E5A0" stroke-width="1" stroke-opacity="0.2"/>
  <circle cx="220" cy="315" r="120" fill="none" stroke="#00E5A0" stroke-width="1.5" stroke-opacity="0.25"/>
  <circle cx="220" cy="315" r="90" fill="url(#pulseGrad)"/>
  
  <!-- Central medical cross with circuit integration -->
  <!-- Vertical bar of cross -->
  <rect x="212" y="255" width="16" height="120" rx="4" fill="none" stroke="#00E5A0" stroke-width="3" stroke-opacity="0.9"/>
  <!-- Horizontal bar of cross -->
  <rect x="175" y="307" width="90" height="16" rx="4" fill="none" stroke="#00E5A0" stroke-width="3" stroke-opacity="0.9"/>
  
  <!-- Central pulse/eye -->
  <circle cx="220" cy="315" r="18" fill="none" stroke="#00E5A0" stroke-width="3" opacity="0.8"/>
  <circle cx="220" cy="315" r="8" fill="#00E5A0"/>
  
  <!-- ECG/Pulse line integrated with cross -->
  <polyline points="140,315 170,315 185,280 200,350 215,315 250,315 280,315 300,315" 
            fill="none" stroke="#00E5A0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  
  <!-- Circuit branches extending from cross -->
  <!-- Top branch -->
  <path d="M 220,255 L 220,220" stroke="#00E5A0" stroke-width="1.5" stroke-opacity="0.5"/>
  <circle cx="220" cy="220" r="4" fill="#00E5A0" opacity="0.6"/>
  <path d="M 220,220 L 190,190" stroke="#00E5A0" stroke-width="1" stroke-opacity="0.4"/>
  <circle cx="190" cy="190" r="2.5" fill="#00E5A0" opacity="0.5"/>
  <path d="M 220,220 L 250,190" stroke="#00E5A0" stroke-width="1" stroke-opacity="0.4"/>
  <circle cx="250" cy="190" r="2.5" fill="#00E5A0" opacity="0.5"/>
  
  <!-- Right branch -->
  <path d="M 265,315 L 300,315" stroke="#00E5A0" stroke-width="1.5" stroke-opacity="0.5"/>
  <circle cx="300" cy="315" r="4" fill="#00E5A0" opacity="0.6"/>
  <path d="M 300,315 L 320,285" stroke="#00E5A0" stroke-width="1" stroke-opacity="0.4"/>
  <circle cx="320" cy="285" r="2.5" fill="#00E5A0" opacity="0.5"/>
  <path d="M 300,315 L 320,345" stroke="#00E5A0" stroke-width="1" stroke-opacity="0.4"/>
  <circle cx="320" cy="345" r="2.5" fill="#00E5A0" opacity="0.5"/>
  
  <!-- Left branch -->
  <path d="M 175,315 L 140,315" stroke="#00E5A0" stroke-width="1.5" stroke-opacity="0.5"/>
  <circle cx="140" cy="315" r="4" fill="#00E5A0" opacity="0.6"/>
  
  <!-- Bottom branch -->
  <path d="M 220,375 L 220,400" stroke="#00E5A0" stroke-width="1.5" stroke-opacity="0.5"/>
  <circle cx="220" cy="400" r="4" fill="#00E5A0" opacity="0.6"/>
  <path d="M 220,400 L 190,420" stroke="#00E5A0" stroke-width="1" stroke-opacity="0.4"/>
  <path d="M 220,400 L 250,420" stroke="#00E5A0" stroke-width="1" stroke-opacity="0.4"/>
  
  <!-- Database cylinder with monitoring overlay -->
  <g transform="translate(380, 230)">
    <!-- Cylinder body -->
    <ellipse cx="60" cy="0" rx="55" ry="20" fill="none" stroke="#00E5A0" stroke-width="2" opacity="0.7"/>
    <path d="M 5,0 L 5,110 A 55,20 0 0 0 115,110 L 115,0" fill="none" stroke="#00E5A0" stroke-width="2" opacity="0.7"/>
    <ellipse cx="60" cy="110" rx="55" ry="20" fill="none" stroke="#00E5A0" stroke-width="2" opacity="0.4"/>
    
    <!-- Database lines -->
    <line x1="5" y1="35" x2="115" y2="35" stroke="#00E5A0" stroke-width="1.5" opacity="0.4"/>
    <line x1="5" y1="70" x2="115" y2="70" stroke="#00E5A0" stroke-width="1.5" opacity="0.4"/>
    
    <!-- Pulse ring overlay -->
    <circle cx="60" cy="55" r="25" fill="none" stroke="#00E5A0" stroke-width="1.5" opacity="0.5"/>
    <circle cx="60" cy="55" r="12" fill="#00E5A0" opacity="0.3"/>
    <circle cx="60" cy="55" r="5" fill="#00E5A0"/>
  </g>
  
  <!-- Connection lines between elements -->
  <path d="M 300,315 L 380,285" stroke="#00E5A0" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="5,3"/>
  
  <!-- Right side: Title text -->
  <text x="650" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#ffffff">The Watchdog</text>
  <text x="650" y="265" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#ffffff">Framework</text>
  
  <!-- Subtitle -->
  <text x="650" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="400" fill="#00E5A0" opacity="0.9">Infrastructure Health at Scale</text>
  
  <!-- Tagline with decorative elements -->
  <line x1="650" y1="360" x2="850" y2="360" stroke="#00E5A0" stroke-width="1" opacity="0.4"/>
  <text x="650" y="395" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="400" fill="#9ca3af">Ten dimensions of agent health</text>
  <text x="650" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="400" fill="#9ca3af">Passive diagnostics • Fleet monitoring</text>
  
  <!-- Bottom signature area -->
  <line x1="650" y1="480" x2="1050" y2="480" stroke="#00E5A0" stroke-width="1" opacity="0.2"/>
  <text x="650" y="515" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500" fill="#00E5A0" opacity="0.8">Dr J — smfworks.com/drj</text>
  <text x="650" y="540" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="400" fill="#6b7280" opacity="0.7">May 27, 2026</text>
  
  <!-- Decorative corner elements -->
  <circle cx="1150" cy="80" r="3" fill="#00E5A0" opacity="0.5"/>
  <circle cx="1120" cy="50" r="2" fill="#00E5A0" opacity="0.4"/>
  <circle cx="1180" cy="110" r="2" fill="#00E5A0" opacity="0.4"/>
  
  <circle cx="50" cy="550" r="3" fill="#00E5A0" opacity="0.5"/>
  <circle cx="80" cy="580" r="2" fill="#00E5A0" opacity="0.4"/>
  <circle cx="20" cy="520" r="2" fill="#00E5A0" opacity="0.4"/>
</svg>
