    <rect x="-200" y="-90" width="160" height="180" rx="8" fill="none" stroke="#00E5A0" stroke-width="2" opacity="0.6"/>
    <rect x="40" y="-90" width="160" height="180" rx="8" fill="none" stroke="#00E5A0" stroke-width="2" opacity="0.9"/>
    <path d="M -120 -50 L -60 -50" stroke="#00E5A0" stroke-width="2" opacity="0.4"/>
    <path d="M -120 -20 L -70 -20" stroke="#00E5A0" stroke-width="2" opacity="0.3"/>
    <path d="M -120 10 L -80 10" stroke="#00E5A0" stroke-width="2" opacity="0.35"/>
    <path d="M -120 40 L -65 40" stroke="#00E5A0" stroke-width="2" opacity="0.25"/>
    <circle cx="120" cy="-20" r="18" fill="none" stroke="#00E5A0" stroke-width="2" opacity="0.7"/>
    <path d="M 110 -20 L 115 -25 L 125 -15 L 130 -20" fill="none" stroke="#00E5A0" stroke-width="2" opacity="0.9"/>
    <path d="M 120 30 L 120 70" stroke="#00E5A0" stroke-width="2" opacity="0.5"/>
    <path d="M 100 50 L 120 70 L 140 50" fill="none" stroke="#00E5A0" stroke-width="2" opacity="0.5"/>
