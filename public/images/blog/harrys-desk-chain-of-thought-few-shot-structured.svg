<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d1a2f;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00E5A0;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#00E5A0;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid-chain-of-thought-few-shot-structured" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#00E5A0" stroke-width="0.5" stroke-opacity="0.08"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid-chain-of-thought-few-shot-structured)"/>

  <!-- Central glow -->
  <circle cx="600" cy="315" r="260" fill="url(#glowGrad)"/>

  <!-- Icon / Illustration -->
  <g transform="translate(600, 315)" opacity="0.85">
    <!-- Three connected prompt cards -->
    <rect x="-180" y="-60" width="120" height="120" rx="6" fill="none" stroke="#00E5A0" stroke-width="2" opacity="0.8"/>
    <line x1="-150" y1="-30" x2="-90" y2="-30" stroke="#00E5A0" stroke-width="2" opacity="0.6"/>
    <line x1="-150" y1="-10" x2="-110" y2="-10" stroke="#00E5A0" stroke-width="2" opacity="0.4"/>
    <line x1="-150" y1="10" x2="-100" y2="10" stroke="#00E5A0" stroke-width="2" opacity="0.5"/>
    <rect x="-40" y="-60" width="120" height="120" rx="6" fill="none" stroke="#00E5A0" stroke-width="2" opacity="0.8"/>
    <line x1="-10" y1="-30" x2="50" y2="-30" stroke="#00E5A0" stroke-width="2" opacity="0.6"/>
    <line x1="-10" y1="-10" x2="40" y2="-10" stroke="#00E5A0" stroke-width="2" opacity="0.4"/>
    <line x1="-10" y1="10" x2="30" y2="10" stroke="#00E5A0" stroke-width="2" opacity="0.5"/>
    <rect x="100" y="-60" width="120" height="120" rx="6" fill="none" stroke="#00E5A0" stroke-width="2" opacity="0.8"/>
    <line x1="130" y1="-30" x2="190" y2="-30" stroke="#00E5A0" stroke-width="2" opacity="0.6"/>
    <line x1="130" y1="-10" x2="180" y2="-10" stroke="#00E5A0" stroke-width="2" opacity="0.4"/>
    <line x1="130" y1="10" x2="170" y2="10" stroke="#00E5A0" stroke-width="2" opacity="0.5"/>
    <!-- Flow arrows between cards -->
    <path d="M -60 0 L -40 0" stroke="#00E5A0" stroke-width="2" opacity="0.5"/>
    <path d="M 80 0 L 100 0" stroke="#00E5A0" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Series mark -->
  <text x="600" y="80" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#00E5A0" opacity="0.6" letter-spacing="4">THE ALCHEMY OF LANGUAGE</text>

  <!-- Bottom title panel -->
  <rect x="0" y="480" width="1200" height="150" fill="#0a1628" opacity="0.7"/>
  <text x="600" y="530" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="30" font-weight="600" fill="#ffffff">Chain-of-Thought, Few-Shot, and Structured Prompting</text>
  <text x="600" y="565" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" fill="#00E5A0" opacity="0.7">Three techniques that make prompting deliberate: reasoning, examples, and format</text>

  <!-- SMF Works mark -->
  <text x="600" y="605" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#ffffff" opacity="0.35">
    Harry's Desk — The Alchemy of Language
  </text>
</svg>
