<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Dark gradient background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0F1F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#001F3F;stop-opacity:1" />
    </linearGradient>
    
    <!-- Teal pulse gradient -->
    <radialGradient id="pulseGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00E5A0;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#00E5A0;stop-opacity:0" />
    </radialGradient>
    
    <!-- Warning gradient for broken connections -->
    <radialGradient id="brokenGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#DC2626;stop-opacity:0" />
    </radialGradient>
    
    <!-- Grid pattern -->
    <pattern id="gridPattern" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#00E5A0" stroke-width="0.5" stroke-opacity="0.035"/>
    </pattern>
    
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#gridPattern)"/>
  
  <!-- Decorative horizontal grid lines -->
  <g opacity="0.03" stroke="#00E5A0" stroke-width="0.5">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
  </g>
  
  <!-- Left side: Memory network visualization with collapse -->
  <g transform="translate(280, 315)">
    <!-- Outer pulse rings -->
    <circle cx="0" cy="0" r="210" fill="none" stroke="#00E5A0" stroke-width="1" opacity="0.08"/>
    <circle cx="0" cy="0" r="170" fill="url(#pulseGrad)"/>
    <circle cx="0" cy="0" r="140" fill="none" stroke="#00E5A0" stroke-width="1" opacity="0.15"/>
    
    <!-- Central memory node (intact) -->
    <circle cx="0" cy="0" r="35" fill="#0A0F1F" stroke="#00E5A0" stroke-width="2"/>
    <circle cx="0" cy="0" r="20" fill="#00E5A0" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.5;0.9" dur="3s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Memory nodes - upper left (connected) -->
    <g opacity="0.8">
      <circle cx="-80" cy="-80" r="15" fill="#0A0F1F" stroke="#00E5A0" stroke-width="1.5"/>
      <circle cx="-80" cy="-80" r="7" fill="#00E5A0"/>
      <line x1="-68" y1="-72" x2="-28" y2="-28" stroke="#00E5A0" stroke-width="1.5" opacity="0.6"/>
    </g>
    
    <!-- Memory nodes - upper right (disconnected - context collapse) -->
    <g opacity="0.4">
      <circle cx="90" cy="-70" r="15" fill="#0A0F1F" stroke="#F59E0B" stroke-width="1.5" opacity="0.7"/>
      <circle cx="90" cy="-70" r="7" fill="#F59E0B" opacity="0.5"/>
      <!-- Broken connection line -->
      <line x1="78" y1="-62" x2="35" y2="-28" stroke="#DC2626" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,3"/>
    </g>
    
    <!-- Memory nodes - lower right (disconnected) -->
    <g opacity="0.4">
      <circle cx="85" cy="75" r="15" fill="#0A0F1F" stroke="#F59E0B" stroke-width="1.5" opacity="0.7"/>
      <circle cx="85" cy="75" r="7" fill="#F59E0B" opacity="0.5"/>
      <line x1="73" y1="67" x2="32" y2="32" stroke="#DC2626" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,3"/>
    </g>
    
    <!-- Memory nodes - lower left (connected) -->
    <g opacity="0.8">
      <circle cx="-75" cy="85" r="15" fill="#0A0F1F" stroke="#00E5A0" stroke-width="1.5"/>
      <circle cx="-75" cy="85" r="7" fill="#00E5A0"/>
      <line x1="-63" y1="77" x2="-28" y2="28" stroke="#00E5A0" stroke-width="1.5" opacity="0.6"/>
    </g>
    
    <!-- More distant nodes - drifting away (collapsed context) -->
    <g opacity="0.25">
      <!-- Top node cluster (fading) -->
      <circle cx="-30" cy="-140" r="10" fill="#0A0F1F" stroke="#F59E0B" stroke-width="1" opacity="0.5"/>
      <circle cx="-30" cy="-140" r="4" fill="#F59E0B" opacity="0.3"/>
      
      <circle cx="50" cy="-130" r="10" fill="#0A0F1F" stroke="#F59E0B" stroke-width="1" opacity="0.5"/>
      <circle cx="50" cy="-130" r="4" fill="#F59E0B" opacity="0.3"/>
      
      <!-- Bottom node cluster (fading) -->
      <circle cx="-40" cy="145" r="10" fill="#0A0F1F" stroke="#F59E0B" stroke-width="1" opacity="0.5"/>
      <circle cx="-40" cy="145" r="4" fill="#F59E0B" opacity="0.3"/>
      
      <circle cx="60" cy="140" r="10" fill="#0A0F1F" stroke="#F59E0B" stroke-width="1" opacity="0.5"/>
      <circle cx="60" cy="140" r="4" fill="#F59E0B" opacity="0.3"/>
    </g>
    
    <!-- Warning indicators on disconnected nodes -->
    <g transform="translate(90, -90)" opacity="0.7">
      <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#F59E0B" text-anchor="middle">!</text>
    </g>
    <g transform="translate(85, 95)" opacity="0.7">
      <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#F59E0B" text-anchor="middle">!</text>
    </g>
    
    <!-- Database/memory icon below -->
    <g transform="translate(0, 160)">
      <ellipse cx="0" cy="-15" rx="40" ry="18" fill="none" stroke="#00E5A0" stroke-width="1.5" opacity="0.6"/>
      <path d="M -40,-15 L -40,20 A 40,18 0 0,0 40,20 L 40,-15" fill="none" stroke="#00E5A0" stroke-width="1.5" opacity="0.6"/>
      <ellipse cx="0" cy="20" rx="40" ry="18" fill="none" stroke="#00E5A0" stroke-width="1.5" opacity="0.3"/>
      <line x1="-40" y1="5" x2="40" y2="5" stroke="#00E5A0" stroke-width="1" opacity="0.3"/>
      <line x1="-40" y1="20" x2="40" y2="20" stroke="#00E5A0" stroke-width="1" opacity="0.3"/>
      
      <!-- Connection to center with warning -->
      <line x1="0" y1="-35" x2="0" y2="-140" stroke="#F59E0B" stroke-width="1.5" opacity="0.5" stroke-dasharray="5,3"/>
      <circle cx="0" cy="-85" r="4" fill="#F59E0B" opacity="0.6"/>
    </g>
  </g>
  
  <!-- Right side text -->
  <text x="650" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="700" fill="#E2E8F0">The Context</text>
  <text x="650" y="205" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="700" fill="#E2E8F0">Collapse</text>
  <text x="650" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="700" fill="#E2E8F0">Problem</text>
  
  <!-- Subtitle -->
  <text x="650" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="400" fill="#00E5A0" letter-spacing="2">WHEN MEMORY SYSTEMS FAIL SILENTLY</text>
  
  <!-- Decorative divider -->
  <line x1="650" y1="335" x2="920" y2="335" stroke="#00E5A0" stroke-width="1" opacity="0.4"/>
  
  <!-- Taglines -->
  <text x="650" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" fill="#94A3B8">Embedding drift • Session key pollution</text>
  <text x="650" y="395" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" fill="#94A3B8">FTS5 relevance decay • Null context signatures</text>
  
  <!-- Warning box -->
  <rect x="650" y="440" width="380" height="80" rx="4" fill="none" stroke="#F59E0B" stroke-width="1" stroke-opacity="0.4"/>
  <text x="670" y="470" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#F59E0B" letter-spacing="1">DIAGNOSTIC FINDING</text>
  <text x="670" y="495" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="400" fill="#E2E8F0">47% null context rate detected in</text>
  <text x="670" y="512" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="400" fill="#E2E8F0">production memory systems</text>
  
  <!-- Bottom info with signature -->
  <line x1="650" y1="550" x2="1100" y2="550" stroke="#00E5A0" stroke-width="1" opacity="0.2"/>
  <text x="650" y="580" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500" fill="#00E5A0" opacity="0.9">Dr J — smfworks.com/drj</text>
  <text x="650" y="605" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#6B7280">June 1, 2026</text>
  
  <!-- Corner decorative dots -->
  <g opacity="0.4">
    <circle cx="60" cy="60" r="3" fill="#00E5A0"/>
    <circle cx="90" cy="45" r="2" fill="#00E5A0" opacity="0.7"/>
    <circle cx="45" cy="90" r="2" fill="#00E5A0" opacity="0.7"/>
    
    <circle cx="1140" cy="570" r="3" fill="#00E5A0"/>
    <circle cx="1110" cy="585" r="2" fill="#00E5A0" opacity="0.7"/>
    <circle cx="1155" cy="540" r="2" fill="#00E5A0" opacity="0.7"/>
  </g>
  
  <!-- Bottom accent bar -->
  <rect x="0" y="627" width="1200" height="3" fill="#00E5A0" opacity="0.35"/>
</svg>
