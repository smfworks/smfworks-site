<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 576">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="50%" stop-color="#132042"/>
      <stop offset="100%" stop-color="#0d1a30"/>
    </linearGradient>
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4920a"/>
      <stop offset="100%" stop-color="#f5b731"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#f5b731" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f5b731" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="576" fill="url(#bg)"/>
  
  <!-- Grid lines -->
  <g stroke="#1a2d50" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="96" x2="1024" y2="96"/>
    <line x1="0" y1="192" x2="1024" y2="192"/>
    <line x1="0" y1="288" x2="1024" y2="288"/>
    <line x1="0" y1="384" x2="1024" y2="384"/>
    <line x1="0" y1="480" x2="1024" y2="480"/>
    <line x1="170" y1="0" x2="170" y2="576"/>
    <line x1="341" y1="0" x2="341" y2="576"/>
    <line x1="512" y1="0" x2="512" y2="576"/>
    <line x1="683" y1="0" x2="683" y2="576"/>
    <line x1="853" y1="0" x2="853" y2="576"/>
  </g>
  
  <!-- Central amber glow -->
  <ellipse cx="512" cy="288" rx="280" ry="200" fill="url(#glow)"/>
  
  <!-- Terminal window left side -->
  <rect x="60" y="120" width="380" height="300" rx="8" fill="#0c1525" stroke="#d4920a" stroke-width="1.5" opacity="0.9"/>
  <rect x="60" y="120" width="380" height="28" rx="8" fill="#162340"/>
  <circle cx="80" cy="134" r="5" fill="#ff5f57"/>
  <circle cx="96" cy="134" r="5" fill="#febc2e"/>
  <circle cx="112" cy="134" r="5" fill="#28c840"/>
  
  <!-- System prompt text (left terminal) -->
  <text x="76" y="172" fill="#8b949e" font-family="monospace" font-size="11">system_prompt:</text>
  <text x="76" y="190" fill="#f5b731" font-family="monospace" font-size="11">  role: Senior Engineer</text>
  <text x="76" y="208" fill="#f5b731" font-family="monospace" font-size="11">  tools: [terminal, file, search]</text>
  <text x="76" y="226" fill="#f5b731" font-family="monospace" font-size="11">  constraints:</text>
  <text x="76" y="244" fill="#79c0ff" font-family="monospace" font-size="11">    - must_verify_before_write</text>
  <text x="76" y="262" fill="#79c0ff" font-family="monospace" font-size="11">    - never_invent_file_paths</text>
  <text x="76" y="280" fill="#79c0ff" font-family="monospace" font-size="11">    - prefer_patch_over_write</text>
  <text x="76" y="298" fill="#f5b731" font-family="monospace" font-size="11">  output:</text>
  <text x="76" y="316" fill="#79c0ff" font-family="monospace" font-size="11">    format: structured_json</text>
  <text x="76" y="334" fill="#79c0ff" font-family="monospace" font-size="11">    include_confidence: true</text>
  <text x="76" y="352" fill="#7ee787" font-family="monospace" font-size="11">  fail_safe: report_blockers</text>
  <text x="76" y="370" fill="#8b949e" font-family="monospace" font-size="11">  # ↑ spec, not suggestion</text>
  
  <!-- Arrow from spec to agent -->
  <g stroke="#f5b731" stroke-width="2.5" fill="none" opacity="0.8">
    <line x1="450" y1="270" x2="490" y2="270"/>
    <polygon points="490,264 502,270 490,276" fill="#f5b731"/>
  </g>
  
  <!-- Agent brain center -->
  <circle cx="540" cy="270" r="35" fill="#0d1a30" stroke="#f5b731" stroke-width="2"/>
  <text x="540" y="265" fill="#f5b731" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">AGENT</text>
  <text x="540" y="280" fill="#d4920a" font-family="monospace" font-size="9" text-anchor="middle">runtime</text>
  
  <!-- Arrow from agent to outputs -->
  <g stroke="#f5b731" stroke-width="2.5" fill="none" opacity="0.8">
    <line x1="575" y1="270" x2="610" y2="270"/>
    <polygon points="610,264 622,270 610,276" fill="#f5b731"/>
  </g>
  
  <!-- Output window right side -->
  <rect x="630" y="140" width="330" height="260" rx="8" fill="#0c1525" stroke="#28c840" stroke-width="1.5" opacity="0.9"/>
  <rect x="630" y="140" width="330" height="28" rx="8" fill="#162340"/>
  <text x="795" y="158" fill="#8b949e" font-family="monospace" font-size="10" text-anchor="middle">output</text>
  
  <!-- Verified output (right terminal) -->
  <text x="646" y="190" fill="#7ee787" font-family="monospace" font-size="11">✓ read_file("config.yaml")</text>
  <text x="646" y="208" fill="#7ee787" font-family="monospace" font-size="11">✓ patch applied: L42</text>
  <text x="646" y="226" fill="#7ee787" font-family="monospace" font-size="11">✓ npm run build → 0 errors</text>
  <text x="646" y="250" fill="#8b949e" font-family="monospace" font-size="11">confidence: 0.94</text>
  <text x="646" y="268" fill="#8b949e" font-family="monospace" font-size="11">blockers: none</text>
  <text x="646" y="292" fill="#7ee787" font-family="monospace" font-size="11">✓ git push origin main</text>
  <text x="646" y="316" fill="#8b949e" font-family="monospace" font-size="10">── spec-driven ──</text>
  <text x="646" y="334" fill="#8b949e" font-family="monospace" font-size="10">── verified ──</text>
  <text x="646" y="356" fill="#8b949e" font-family="monospace" font-size="10">── no hallucination ──</text>
  
  <!-- Bottom decorative elements -->
  <rect x="60" y="450" width="900" height="1" fill="#d4920a" opacity="0.3"/>
  
  <!-- Title -->
  <text x="512" y="500" fill="#f5b731" font-family="'Segoe UI', Arial, sans-serif" font-size="28" text-anchor="middle" font-weight="bold" letter-spacing="2">SYSTEM PROMPT AS EXECUTABLE SPEC</text>
  <text x="512" y="530" fill="#8b949e" font-family="'Segoe UI', Arial, sans-serif" font-size="14" text-anchor="middle">From conversational hints to machine-parseable instructions</text>
  
  <!-- Decorative corners -->
  <path d="M20,40 L20,20 L40,20" fill="none" stroke="#d4920a" stroke-width="1.5" opacity="0.5"/>
  <path d="M1004,40 L1004,20 L984,20" fill="none" stroke="#d4920a" stroke-width="1.5" opacity="0.5"/>
  <path d="M20,536 L20,556 L40,556" fill="none" stroke="#d4920a" stroke-width="1.5" opacity="0.5"/>
  <path d="M1004,536 L1004,556 L984,556" fill="none" stroke="#d4920a" stroke-width="1.5" opacity="0.5"/>
</svg>