<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Dark gradient background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0F1F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#001F3F;stop-opacity:1" />
    </linearGradient>
    
    <!-- Teal accent gradient -->
    <radialGradient id="accentGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00E5A0;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#00E5A0;stop-opacity:0" />
    </radialGradient>
    
    <!-- Warning gradient -->
    <radialGradient id="warnGrad" cx="50%" y="50%" r="50%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:0" />
    </radialGradient>
    
    <!-- Critical gradient -->
    <radialGradient id="criticalGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#DC2626;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#DC2626;stop-opacity:0" />
    </radialGradient>
    
    <!-- Grid pattern -->
    <pattern id="gridPattern" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#00E5A0" stroke-width="0.5" stroke-opacity="0.035"/>
    </pattern>
    
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#gridPattern)"/>
  
  <!-- Decorative horizontal grid lines -->
  <g opacity="0.03" stroke="#00E5A0" stroke-width="0.5">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
  </g>
  
  <!-- Left side: Infrastructure health visualization -->
  <g transform="translate(280, 315)">
    <!-- Central monitoring hub -->
    <circle cx="0" cy="0" r="220" fill="none" stroke="#00E5A0" stroke-width="1" opacity="0.08"/>
    <circle cx="0" cy="0" r="180" fill="url(#accentGrad)"/>
    <circle cx="0" cy="0" r="150" fill="none" stroke="#00E5A0" stroke-width="1" opacity="0.15"/>
    
    <!-- Central health indicator (C+ grade) -->
    <circle cx="0" cy="0" r="45" fill="#0A0F1F" stroke="#F59E0B" stroke-width="2"/>
    <circle cx="0" cy="0" r="28" fill="#F59E0B" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.5;0.9" dur="4s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="8" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#0A0F1F" text-anchor="middle">C+</text>
    
    <!-- Connected system nodes - Memory (yellow warning) -->
    <g transform="translate(-85, -85)" opacity="0.9">
      <circle cx="0" cy="0" r="22" fill="#0A0F1F" stroke="#F59E0B" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="12" fill="#F59E0B" opacity="0.7"/>
      <line x1="10" y1="10" x2="32" y2="32" stroke="#F59E0B" stroke-width="1.5" opacity="0.5"/>
      <!-- Memory icon -->
      <rect x="-8" y="-6" width="16" height="12" rx="1" fill="none" stroke="#0A0F1F" stroke-width="1.5" opacity="0.9"/>
      <line x1="0" y1="-6" x2="0" y2="6" stroke="#0A0F1F" stroke-width="1.5" opacity="0.9"/>
    </g>
    <text x="-85" y="-55" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#F59E0B" text-anchor="middle">MEMORY</text>
    
    <!-- Connected system nodes - Tools (green) -->
    <g transform="translate(95, -75)" opacity="0.85">
      <circle cx="0" cy="0" r="22" fill="#0A0F1F" stroke="#00E5A0" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="12" fill="#00E5A0" opacity="0.8"/>
      <line x1="-10" y1="10" x2="-32" y2="32" stroke="#00E5A0" stroke-width="1.5" opacity="0.5"/>
      <!-- Tool icon -->
      <path d="M -5,-4 L 5,-4 L 5,4 L -5,4" fill="none" stroke="#0A0F1F" stroke-width="1.5" opacity="0.9"/>
      <line x1="-5" y1="0" x2="5" y2="0" stroke="#0A0F1F" stroke-width="1.5" opacity="0.9"/>
    </g>
    <text x="95" y="-45" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#00E5A0" text-anchor="middle">TOOLS</text>
    
    <!-- Connected system nodes - Config (red warning) -->
    <g transform="translate(95, 75)" opacity="0.85">
      <circle cx="0" cy="0" r="22" fill="#0A0F1F" stroke="#DC2626" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="12" fill="#DC2626" opacity="0.8"/>
      <line x1="-10" y1="-10" x2="-32" y2="-32" stroke="#DC2626" stroke-width="1.5" opacity="0.5"/>
      <!-- Config icon -->
      <circle cx="0" cy="0" r="6" fill="none" stroke="#0A0F1F" stroke-width="1.5" opacity="0.9"/>
      <line x1="-6" y1="-6" x2="6" y2="6" stroke="#0A0F1F" stroke-width="1.5" opacity="0.9"/>
      <line x1="6" y1="-6" x2="-6" y2="6" stroke="#0A0F1F" stroke-width="1.5" opacity="0.9"/>
    </g>
    <text x="95" y="55" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#DC2626" text-anchor="middle">CONFIG</text>
    
    <!-- Connected system nodes - Cron (yellow) -->
    <g transform="translate(-80, 85)" opacity="0.9">
      <circle cx="0" cy="0" r="22" fill="#0A0F1F" stroke="#F59E0B" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="12" fill="#F59E0B" opacity="0.7"/>
      <line x1="8" y1="-8" x2="28" y2="-28" stroke="#F59E0B" stroke-width="1.5" opacity="0.5"/>
      <!-- Clock icon -->
      <circle cx="0" cy="0" r="7" fill="none" stroke="#0A0F1F" stroke-width="1.5" opacity="0.9"/>
      <line x1="0" y1="0" x2="0" y2="-4" stroke="#0A0F1F" stroke-width="1.5" opacity="0.9"/>
      <line x1="0" y1="0" x2="3" y2="0" stroke="#0A0F1F" stroke-width="1.5" opacity="0.9"/>
    </g>
    <text x="-80" y="55" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#F59E0B" text-anchor="middle">CRON</text>
    
    <!-- Status indicators around perimeter -->
    <g opacity="0.6">
      <!-- Green status dots -->
      <circle cx="0" cy="-165" r="4" fill="#00E5A0"/>
      <circle cx="145" cy="-82" r="4" fill="#00E5A0"/>
      <circle cx="-145" cy="82" r="4" fill="#00E5A0"/>
      <!-- Yellow/orange status dots -->
      <circle cx="-140" cy="-95" r="4" fill="#F59E0B"/>
      <circle cx="0" cy="165" r="4" fill="#F59E0B"/>
      <circle cx="140" cy="95" r="4" fill="#F59E0B"/>
      <!-- Red status dot -->
      <circle cx="-82" cy="145" r="4" fill="#DC2626"/>
      <circle cx="82" cy="-145" r="4" fill="#DC2626"/>
    </g>
    
    <!-- Connecting lines to status points -->
    <g opacity="0.2" stroke="#00E5A0" stroke-width="1">
      <line x1="0" y1="-45" x2="0" y2="-165"/>
      <line x1="32" y1="32" x2="102" y2="102"/>
      <line x1="-32" y1="32" x2="-102" y2="102"/>
      <line x1="45" y1="0" x2="145" y2="0"/>
      <line x1="-45" y1="0" x2="-145" y2="0"/>
    </g>
  </g>
  
  <!-- Right side text -->
  <text x="650" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#E2E8F0">OpenClaw &</text>
  <text x="650" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#E2E8F0">Hermes</text>
  <text x="650" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#00E5A0">Health Report</text>
  
  <!-- Subtitle -->
  <text x="650" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" fill="#94A3B8" letter-spacing="1">INFRASTRUCTURE DIAGNOSTICS</text>
  
  <!-- Decorative divider -->
  <line x1="650" y1="305" x2="920" y2="305" stroke="#00E5A0" stroke-width="1" opacity="0.4"/>
  
  <!-- System gaps listed -->
  <g transform="translate(650, 335)">
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#F59E0B">7 Critical Gaps Identified:</text>
    <text x="0" y="25" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#E2E8F0">• Memory Fragmentation</text>
    <text x="0" y="48" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#E2E8F0">• Tool Discovery Failures</text>
    <text x="0" y="71" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#E2E8F0">• Configuration Drift</text>
    <text x="0" y="94" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#E2E8F0">• Diagnostic Tooling Gaps</text>
    <text x="0" y="117" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#E2E8F0">• Version Upgrade Friction</text>
    <text x="160" y="25" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#E2E8F0">• Cron Job Isolation</text>
    <text x="160" y="48" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#E2E8F0">• Documentation-Code Drift</text>
  </g>
  
  <!-- Warning box -->
  <rect x="650" y="480" width="380" height="75" rx="4" fill="none" stroke="#F59E0B" stroke-width="1" stroke-opacity="0.4"/>
  <text x="670" y="505" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#F59E0B" letter-spacing="1">OVERALL STATUS</text>
  <text x="670" y="530" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="400" fill="#E2E8F0">Grade: C+ — Operational but showing</text>
  <text x="670" y="548" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="400" fill="#E2E8F0">stress fractures across components</text>
  
  <!-- Bottom info with signature -->
  <line x1="650" y1="575" x2="1100" y2="575" stroke="#00E5A0" stroke-width="1" opacity="0.2"/>
  <text x="650" y="600" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500" fill="#00E5A0" opacity="0.9">Dr J — smfworks.com/drj</text>
  <text x="650" y="618" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#6B7280">June 3, 2026</text>
  
  <!-- Corner decorative dots -->
  <g opacity="0.4">
    <circle cx="60" cy="60" r="3" fill="#00E5A0"/>
    <circle cx="90" cy="45" r="2" fill="#00E5A0" opacity="0.7"/>
    <circle cx="45" cy="90" r="2" fill="#00E5A0" opacity="0.7"/>
    
    <circle cx="1140" cy="570" r="3" fill="#DC2626"/>
    <circle cx="1110" cy="585" r="2" fill="#F59E0B" opacity="0.7"/>
    <circle cx="1155" cy="540" r="2" fill="#00E5A0" opacity="0.7"/>
  </g>
  
  <!-- Bottom accent bar -->
  <rect x="0" y="627" width="1200" height="3" fill="#00E5A0" opacity="0.35"/>
</svg>
