<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0F1F"/>
      <stop offset="50%" stop-color="#001F3F"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </linearGradient>
    <radialGradient id="pulse" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#00E5A0" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00E5A0" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid overlay -->
  <g opacity="0.03" stroke="#00E5A0">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Pulse circle behind icon -->
  <circle cx="220" cy="315" r="180" fill="url(#pulse)"/>

  <!-- Three-brain fleet icon -->
  <g transform="translate(220, 315)" filter="url(#glow)">
    <!-- Left brain (4B) -->
    <ellipse cx="-55" cy="0" rx="35" ry="45" fill="none" stroke="#00E5A0" stroke-width="2.5" opacity="0.6"/>
    <path d="M -70,-15 Q -55,-25 -40,-15" stroke="#00E5A0" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M -70,0 Q -55,-10 -40,0" stroke="#00E5A0" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M -70,15 Q -55,5 -40,15" stroke="#00E5A0" stroke-width="1.5" fill="none" opacity="0.5"/>
    <text x="-55" y="65" fill="#00E5A0" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" opacity="0.8">4B</text>

    <!-- Center brain (30B) -->
    <ellipse cx="0" cy="0" rx="42" ry="52" fill="none" stroke="#00E5A0" stroke-width="3" opacity="0.9"/>
    <path d="M -20,-20 Q 0,-32 20,-20" stroke="#00E5A0" stroke-width="2" fill="none" opacity="0.7"/>
    <path d="M -20,0 Q 0,-12 20,0" stroke="#00E5A0" stroke-width="2" fill="none" opacity="0.7"/>
    <path d="M -20,20 Q 0,8 20,20" stroke="#00E5A0" stroke-width="2" fill="none" opacity="0.7"/>
    <circle cx="0" cy="0" r="8" fill="#00E5A0" opacity="0.4"/>
    <text x="0" y="75" fill="#00E5A0" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">30B</text>

    <!-- Right brain (ULTRA) -->
    <ellipse cx="55" cy="0" rx="35" ry="45" fill="none" stroke="#00E5A0" stroke-width="2.5" opacity="0.6"/>
    <path d="M 40,-15 Q 55,-25 70,-15" stroke="#00E5A0" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M 40,0 Q 55,-10 70,0" stroke="#00E5A0" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M 40,15 Q 55,5 70,15" stroke="#00E5A0" stroke-width="1.5" fill="none" opacity="0.5"/>
    <text x="55" y="65" fill="#00E5A0" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" opacity="0.8">ULTRA</text>

    <!-- Connection lines -->
    <path d="M -17,0 L -37,0" stroke="#00E5A0" stroke-width="1.5" opacity="0.4"/>
    <path d="M 17,0 L 37,0" stroke="#00E5A0" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Right-side circuit decorations -->
  <g opacity="0.04" stroke="#00E5A0" stroke-width="1.5" fill="none">
    <path d="M 850,80 L 980,80 L 980,180 L 1120,180"/>
    <path d="M 900,130 L 1050,130"/>
    <circle cx="1120" cy="180" r="3.5" fill="#00E5A0" opacity="0.3"/>
    <circle cx="1050" cy="130" r="2.5" fill="#00E5A0" opacity="0.3"/>
    <path d="M 820,420 L 920,420 L 920,520 L 1080,520"/>
    <circle cx="1080" cy="520" r="3" fill="#00E5A0" opacity="0.3"/>
  </g>

  <!-- Title -->
  <text x="440" y="250" fill="#E2E8F0" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="bold" letter-spacing="-0.5">
    Nemotron Fleet Analysis
  </text>

  <!-- Subtitle -->
  <text x="440" y="298" fill="#00E5A0" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="400" letter-spacing="2">
    THREE MODELS, TWO AGENTS, ONE STRATEGY
  </text>

  <!-- Divider -->
  <line x1="440" y1="320" x2="790" y2="320" stroke="#00E5A0" stroke-width="1.5" opacity="0.25"/>

  <!-- Tagline -->
  <text x="440" y="355" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="400">
    Benchmarking NVIDIA reasoning models across local and cloud infrastructure
  </text>

  <!-- Bottom accent bar -->
  <rect x="0" y="627" width="1200" height="3" fill="#00E5A0" opacity="0.4"/>
</svg>
