<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 576">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2744;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4920a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5b942;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5b942;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#d4920a;stop-opacity:0" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="576" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g stroke="#1e3a5f" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="144" x2="1024" y2="144"/>
    <line x1="0" y1="288" x2="1024" y2="288"/>
    <line x1="0" y1="432" x2="1024" y2="432"/>
    <line x1="256" y1="0" x2="256" y2="576"/>
    <line x1="512" y1="0" x2="512" y2="576"/>
    <line x1="768" y1="0" x2="768" y2="576"/>
  </g>
  <!-- Overflowing context blocks (left side - the waste) -->
  <g opacity="0.7">
    <rect x="80" y="80" width="180" height="40" rx="4" fill="#1a2744" stroke="#3a4f6f" stroke-width="1.5"/>
    <rect x="80" y="130" width="220" height="40" rx="4" fill="#1a2744" stroke="#3a4f6f" stroke-width="1.5"/>
    <rect x="80" y="180" width="160" height="40" rx="4" fill="#1a2744" stroke="#3a4f6f" stroke-width="1.5"/>
    <rect x="80" y="230" width="280" height="40" rx="4" fill="#1a2744" stroke="#c44" stroke-width="2"/>
    <rect x="80" y="280" width="300" height="40" rx="4" fill="#1a2744" stroke="#c44" stroke-width="2"/>
    <rect x="80" y="330" width="340" height="40" rx="4" fill="#1a2744" stroke="#c44" stroke-width="2"/>
  </g>
  <!-- Overflow arrows from waste blocks -->
  <g stroke="#c44" stroke-width="2" fill="none" opacity="0.8">
    <path d="M 370 250 L 410 250 L 420 240" marker-end="url(#arrowRed)"/>
    <path d="M 390 300 L 430 300 L 440 290" />
    <path d="M 430 350 L 470 350 L 480 340" />
  </g>
  <!-- "$" signs overflowing from waste -->
  <text x="420" y="245" font-family="monospace" font-size="16" fill="#c44" opacity="0.9">$</text>
  <text x="440" y="295" font-family="monospace" font-size="16" fill="#c44" opacity="0.9">$$</text>
  <text x="485" y="345" font-family="monospace" font-size="16" fill="#c44" opacity="0.9">$$$</text>
  <!-- Clean context window (right side - the solution) -->
  <rect x="560" y="120" width="380" height="360" rx="8" fill="none" stroke="url(#amber)" stroke-width="2"/>
  <!-- Header bar -->
  <rect x="560" y="120" width="380" height="44" rx="8" fill="#0f1f38"/>
  <rect x="560" y="152" width="380" height="12" fill="#0f1f38"/>
  <text x="750" y="148" font-family="monospace" font-size="14" fill="#f5b942" text-anchor="middle" font-weight="bold">CONTEXT WINDOW — 128K</text>
  <!-- Clean content blocks inside -->
  <rect x="580" y="180" width="340" height="30" rx="3" fill="#162940" stroke="#2a4a6f" stroke-width="1"/>
  <text x="590" y="200" font-family="monospace" font-size="11" fill="#6b8fb5">system prompt ██████░░░░ 12%</text>
  <rect x="580" y="220" width="340" height="30" rx="3" fill="#162940" stroke="#2a4a6f" stroke-width="1"/>
  <text x="590" y="240" font-family="monospace" font-size="11" fill="#6b8fb5">conversation ███████░░░ 18%</text>
  <rect x="580" y="260" width="340" height="30" rx="3" fill="#162940" stroke="#d4920a" stroke-width="1"/>
  <text x="590" y="280" font-family="monospace" font-size="11" fill="#f5b942">relevant context ████████░░ 22%</text>
  <rect x="580" y="300" width="340" height="30" rx="3" fill="#162940" stroke="#2a4a6f" stroke-width="1"/>
  <text x="590" y="320" font-family="monospace" font-size="11" fill="#6b8fb5">tool output ███████░░░░ 17%</text>
  <!-- Free space indicator -->
  <rect x="580" y="350" width="340" height="60" rx="3" fill="none" stroke="#2a6a3a" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="750" y="385" font-family="monospace" font-size="13" fill="#4a9a5a" text-anchor="middle">31% free — room to think</text>
  <!-- Bottom bar -->
  <rect x="560" y="440" width="380" height="40" rx="0" fill="#0f1f38"/>
  <rect x="560" y="436" width="380" height="4" fill="#0f1f38"/>
  <text x="750" y="465" font-family="monospace" font-size="11" fill="#4a9a5a" text-anchor="middle">✓ compression ratio 0.3 — 38K tokens remaining</text>
  <!-- Title text -->
  <text x="512" y="510" font-family="Arial, sans-serif" font-size="28" fill="#f5b942" text-anchor="middle" font-weight="bold" letter-spacing="2">CONTEXT IS MONEY</text>
  <text x="512" y="545" font-family="monospace" font-size="14" fill="#6b8fb5" text-anchor="middle" letter-spacing="1">every token has a price — spend wisely</text>
</svg>