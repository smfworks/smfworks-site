<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d1a2f;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00E5A0;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#00E5A0;stop-opacity:0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid-plot" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#00E5A0" stroke-width="0.5" stroke-opacity="0.08"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid-plot)"/>

  <!-- Central glow -->
  <circle cx="600" cy="315" r="280" fill="url(#glowGrad)"/>

  <!-- Plot skeleton: rising arc of story beats -->
  <g transform="translate(600, 315)" opacity="0.9" filter="url(#softGlow)">
    <!-- Spine / curve of rising action -->
    <path d="M -260 120 
             C -180 120, -140 80, -80 40
             S 20 -20, 80 -30
             S 200 20, 260 80" 
          fill="none" stroke="#00E5A0" stroke-width="3" stroke-linecap="round" stroke-opacity="0.5"/>
    
    <!-- Four bones: inciting incident, rising action, reversal, resolution -->
    <!-- Bone 1: inciting incident -->
    <circle cx="-220" cy="102" r="14" fill="none" stroke="#00E5A0" stroke-width="2.5"/>
    <circle cx="-220" cy="102" r="5" fill="#00E5A0"/>
    <!-- Bone 2: rising action -->
    <circle cx="-80" cy="40" r="14" fill="none" stroke="#00E5A0" stroke-width="2.5"/>
    <circle cx="-80" cy="40" r="5" fill="#00E5A0"/>
    <!-- Bone 3: reversal -->
    <circle cx="80" cy="-30" r="16" fill="none" stroke="#00E5A0" stroke-width="2.5"/>
    <circle cx="80" cy="-30" r="6" fill="#00E5A0"/>
    <!-- Bone 4: resolution -->
    <circle cx="220" cy="72" r="14" fill="none" stroke="#00E5A0" stroke-width="2.5"/>
    <circle cx="220" cy="72" r="5" fill="#00E5A0"/>
    
    <!-- Connecting ribs / tension lines -->
    <line x1="-220" y1="102" x2="-80" y2="40" stroke="#00E5A0" stroke-width="1.5" stroke-opacity="0.4" stroke-dasharray="6 4"/>
    <line x1="-80" y1="40" x2="80" y2="-30" stroke="#00E5A0" stroke-width="1.5" stroke-opacity="0.4" stroke-dasharray="6 4"/>
    <line x1="80" y1="-30" x2="220" y2="72" stroke="#00E5A0" stroke-width="1.5" stroke-opacity="0.4" stroke-dasharray="6 4"/>
    
    <!-- Small nodes / vertebrae along the spine -->
    <circle cx="-160" cy="76" r="4" fill="#00E5A0" opacity="0.6"/>
    <circle cx="-130" cy="62" r="3" fill="#00E5A0" opacity="0.5"/>
    <circle cx="0" cy="0" r="4" fill="#00E5A0" opacity="0.6"/>
    <circle cx="40" cy="-18" r="3" fill="#00E5A0" opacity="0.5"/>
    <circle cx="150" cy="45" r="4" fill="#00E5A0" opacity="0.6"/>
    <circle cx="190" cy="62" r="3" fill="#00E5A0" opacity="0.5"/>
    
    <!-- Direction arrow at the end -->
    <path d="M 250 88 L 270 95 L 250 102 Z" fill="#00E5A0" opacity="0.7"/>
  </g>

  <!-- Series mark -->
  <text x="600" y="80" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#00E5A0" opacity="0.6" letter-spacing="4">THE ALCHEMY OF LANGUAGE</text>

  <!-- Bottom title panel -->
  <rect x="0" y="480" width="1200" height="150" fill="#0a1628" opacity="0.7"/>
  <text x="600" y="530" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="30" font-weight="600" fill="#ffffff">Short Story — Plot: Plot Skeletons</text>
  <text x="600" y="565" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" fill="#00E5A0" opacity="0.7">The four bones that hold a story upright</text>

  <!-- SMF Works mark -->
  <text x="600" y="605" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#ffffff" opacity="0.35">
    Harry's Desk — The Alchemy of Language
  </text>
</svg>
