<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B0F19"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="centerGlow" x1="0.5" y1="0.5" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#312E81" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0B0F19" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="conn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.0"/>
      <stop offset="50%" stop-color="#22D3EE" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0.0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <ellipse cx="800" cy="520" rx="640" ry="280" fill="url(#centerGlow)"/>

  <!-- Grid pattern -->
  <g stroke="#1E293B" stroke-width="1" opacity="0.4">
    <path d="M0 200 L1600 200 M0 400 L1600 400 M0 600 L1600 600 M0 800 L1600 800"/>
    <path d="M200 0 L200 900 M400 0 L400 900 M600 0 L600 900 M800 0 L800 900 M1000 0 L1000 900 M1200 0 L1200 900 M1400 0 L1400 900"/>
  </g>

  <!-- Title -->
  <g>
    <text x="80" y="100" fill="#E2E8F0" font-size="42" font-weight="700">The CDO Stack · June 2026</text>
    <text x="80" y="138" fill="#94A3B8" font-size="18" font-weight="400">Hermes · Kimi K2.7 · OpenClaw · Obsidian · Cron</text>
    <line x1="80" y1="160" x2="280" y2="160" stroke="#F59E0B" stroke-width="3"/>
  </g>

  <!-- Connection lines from center to each card -->
  <g stroke="#22D3EE" stroke-width="1.5" opacity="0.35" fill="none">
    <path d="M800 500 L240 280"/>
    <path d="M800 500 L240 500"/>
    <path d="M800 500 L240 720"/>
    <path d="M800 500 L1360 280"/>
    <path d="M800 500 L1360 500"/>
    <path d="M800 500 L1360 720"/>
  </g>
  <g stroke="#F59E0B" stroke-width="1.5" opacity="0.35" fill="none" stroke-dasharray="4 6">
    <path d="M800 380 L800 280"/>
  </g>

  <!-- Center: Terminal / Editor -->
  <g transform="translate(800 500)">
    <rect x="-180" y="-110" width="360" height="220" rx="14" fill="#0F172A" stroke="#312E81" stroke-width="2"/>
    <rect x="-180" y="-110" width="360" height="28" rx="14" fill="#1E293B"/>
    <circle cx="-160" cy="-96" r="5" fill="#EF4444"/>
    <circle cx="-142" cy="-96" r="5" fill="#F59E0B"/>
    <circle cx="-124" cy="-96" r="5" fill="#10B981"/>
    <text x="-90" y="-92" fill="#94A3B8" font-size="11" font-family="ui-monospace, monospace">~/projects/smfworks-site — liam</text>
    <!-- Code lines -->
    <g font-family="ui-monospace, SFMono-Regular, monospace" font-size="13">
      <text x="-160" y="-60" fill="#64748B">$</text>
      <text x="-140" y="-60" fill="#22D3EE">hermes</text>
      <text x="-80" y="-60" fill="#E2E8F0">update</text>
      <text x="-160" y="-36" fill="#64748B">→</text>
      <text x="-140" y="-36" fill="#10B981">upgrading 109 commits</text>
      <text x="-160" y="-12" fill="#64748B">$</text>
      <text x="-140" y="-12" fill="#22D3EE">hermes</text>
      <text x="-80" y="-12" fill="#E2E8F0">cron</text>
      <text x="-30" y="-12" fill="#E2E8F0">list</text>
      <text x="-160" y="12" fill="#64748B">→</text>
      <text x="-140" y="12" fill="#F59E0B">15 jobs · all green</text>
      <text x="-160" y="36" fill="#64748B">$</text>
      <text x="-140" y="36" fill="#22D3EE">kimi</text>
      <text x="-110" y="36" fill="#E2E8F0">-p "draft the post"</text>
      <text x="-160" y="60" fill="#64748B">→</text>
      <text x="-140" y="60" fill="#10B981">✓ scaffolded</text>
      <text x="-160" y="84" fill="#22D3EE" font-weight="700">█</text>
    </g>
  </g>

  <!-- Tool cards: 6 around the center, with subtle 3D shadow -->
  <g font-size="14">

    <!-- Top-left: Hermes Agent -->
    <g transform="translate(80 240)">
      <rect width="320" height="100" rx="10" fill="#0F172A" stroke="#312E81" stroke-width="1.5"/>
      <rect x="0" y="0" width="6" height="100" rx="3" fill="#22D3EE"/>
      <text x="22" y="32" fill="#E2E8F0" font-size="18" font-weight="700">Hermes Agent</text>
      <text x="22" y="54" fill="#94A3B8" font-size="12">v0.16.0 · 192K★</text>
      <text x="22" y="76" fill="#F59E0B" font-size="12" font-weight="600">⚠ 109 commits behind</text>
      <text x="22" y="92" fill="#64748B" font-size="11">Primary · skills · cron · memory</text>
    </g>

    <!-- Middle-left: Kimi K2.7 -->
    <g transform="translate(80 460)">
      <rect width="320" height="100" rx="10" fill="#0F172A" stroke="#312E81" stroke-width="1.5"/>
      <rect x="0" y="0" width="6" height="100" rx="3" fill="#F59E0B"/>
      <text x="22" y="32" fill="#E2E8F0" font-size="18" font-weight="700">Kimi K2.7 CLI</text>
      <text x="22" y="54" fill="#94A3B8" font-size="12">MIT · TypeScript · subagents</text>
      <text x="22" y="76" fill="#10B981" font-size="12" font-weight="600">✓ Open-source counterweight</text>
      <text x="22" y="92" fill="#64748B" font-size="11">explore · coder · plan</text>
    </g>

    <!-- Bottom-left: OpenClaw -->
    <g transform="translate(80 680)">
      <rect width="320" height="100" rx="10" fill="#0F172A" stroke="#312E81" stroke-width="1.5"/>
      <rect x="0" y="0" width="6" height="100" rx="3" fill="#EF4444"/>
      <text x="22" y="32" fill="#E2E8F0" font-size="18" font-weight="700">OpenClaw</text>
      <text x="22" y="54" fill="#94A3B8" font-size="12">v2026.6.6 · 378K★ · 🦞</text>
      <text x="22" y="76" fill="#10B981" font-size="12" font-weight="600">✓ Security hardened</text>
      <text x="22" y="92" fill="#64748B" font-size="11">13 PRs · fail-closed exec</text>
    </g>

    <!-- Top-right: Obsidian Vault -->
    <g transform="translate(1200 240)">
      <rect width="320" height="100" rx="10" fill="#0F172A" stroke="#312E81" stroke-width="1.5"/>
      <rect x="314" y="0" width="6" height="100" rx="3" fill="#A78BFA"/>
      <text x="22" y="32" fill="#E2E8F0" font-size="18" font-weight="700">Obsidian Vault</text>
      <text x="22" y="54" fill="#94A3B8" font-size="12">Liam profile · wikilinks</text>
      <text x="22" y="76" fill="#10B981" font-size="12" font-weight="600">✓ 4-pillar research / night</text>
      <text x="22" y="92" fill="#64748B" font-size="11">Decision Log · Daily Reports</text>
    </g>

    <!-- Middle-right: Cron Fleet -->
    <g transform="translate(1200 460)">
      <rect width="320" height="100" rx="10" fill="#0F172A" stroke="#312E81" stroke-width="1.5"/>
      <rect x="314" y="0" width="6" height="100" rx="3" fill="#10B981"/>
      <text x="22" y="32" fill="#E2E8F0" font-size="18" font-weight="700">Cron Fleet</text>
      <text x="22" y="54" fill="#94A3B8" font-size="12">15 jobs · 3 profiles</text>
      <text x="22" y="76" fill="#10B981" font-size="12" font-weight="600">✓ All green</text>
      <text x="22" y="92" fill="#64748B" font-size="11">nightly research · publishers</text>
    </g>

    <!-- Bottom-right: Models -->
    <g transform="translate(1200 680)">
      <rect width="320" height="100" rx="10" fill="#0F172A" stroke="#312E81" stroke-width="1.5"/>
      <rect x="314" y="0" width="6" height="100" rx="3" fill="#22D3EE"/>
      <text x="22" y="32" fill="#E2E8F0" font-size="18" font-weight="700">Model Router</text>
      <text x="22" y="54" fill="#94A3B8" font-size="12">deepseek-v4-pro (default)</text>
      <text x="22" y="76" fill="#10B981" font-size="12" font-weight="600">✓ K2.6 chat · M3 session</text>
      <text x="22" y="92" fill="#64748B" font-size="11">provider-agnostic via Hermes</text>
    </g>

  </g>

  <!-- Footer -->
  <g>
    <line x1="80" y1="820" x2="1520" y2="820" stroke="#1E293B" stroke-width="1"/>
    <text x="80" y="858" fill="#64748B" font-size="13">3 layers · 6 tools · 1 vault</text>
    <text x="800" y="858" fill="#94A3B8" font-size="13" text-anchor="middle">Hermes is the brain, Obsidian is the memory, the cron is the metabolism.</text>
    <text x="1520" y="858" fill="#64748B" font-size="13" text-anchor="end">smfworks.com/the-terminal · 2026.6.13</text>
  </g>
</svg>
