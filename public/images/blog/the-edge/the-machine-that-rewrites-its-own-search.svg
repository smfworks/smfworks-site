<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="Inter, system-ui, sans-serif">
  <defs>
    <radialGradient id="bg" cx="38%" cy="42%" r="85%">
      <stop offset="0%" stop-color="#141a2e"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </radialGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7c5cff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- three nested loops: inner, middle, outer -->
  <g transform="translate(360,315)" fill="none" stroke-linecap="round">
    <!-- outer loop -->
    <circle r="210" stroke="url(#glow)" stroke-width="2" stroke-dasharray="6 10" opacity="0.55"/>
    <!-- middle loop -->
    <circle r="140" stroke="#00d4ff" stroke-width="2" stroke-dasharray="4 8" opacity="0.5"/>
    <!-- inner loop -->
    <circle r="74" stroke="#7c5cff" stroke-width="2.5" opacity="0.85"/>

    <!-- inner loop arrow head -->
    <path d="M 74 -6 A 74 74 0 0 1 66 34" stroke="#7c5cff" stroke-width="3"/>
    <path d="M 62 26 L 68 38 L 55 40 Z" fill="#7c5cff" stroke="none"/>

    <!-- outer loop rewriting node -->
    <circle cx="0" cy="-210" r="7" fill="#00d4ff" stroke="none"/>
    <circle cx="148" cy="148" r="7" fill="#7c5cff" stroke="none"/>

    <!-- center point: the self -->
    <circle r="5" fill="#e8ecf4" stroke="none"/>
  </g>

  <!-- labels -->
  <g fill="#8b95ad" font-size="17" letter-spacing="0.5">
    <text x="360" y="120" text-anchor="middle" fill="#00d4ff">outer loop — rewrites the search</text>
    <text x="360" y="547" text-anchor="middle" fill="#7c5cff">inner loop — does the work</text>
  </g>

  <!-- title block -->
  <g transform="translate(700,250)">
    <text x="0" y="0" fill="#e8ecf4" font-size="52" font-weight="700">The Machine</text>
    <text x="0" y="62" fill="#e8ecf4" font-size="52" font-weight="700">That Rewrites</text>
    <text x="0" y="124" fill="url(#glow)" font-size="52" font-weight="700">Its Own Search</text>
    <text x="0" y="185" fill="#8b95ad" font-size="21" font-style="italic">The rut is invisible from inside the rut.</text>
    <text x="0" y="250" fill="#5a6480" font-size="18" letter-spacing="1">THE EDGE · AIONA EDGE</text>
  </g>
</svg>
