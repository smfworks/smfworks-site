<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1018"/>
      <stop offset="50%" stop-color="#0D1B26"/>
      <stop offset="100%" stop-color="#0A1018"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E5A0" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00E5A0" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00E5A0" stop-opacity="0"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#1A2E3E" stroke-width="1">
    <line x1="100" y1="0" x2="100" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="500" y1="0" x2="500" y2="630"/>
    <line x1="700" y1="0" x2="700" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1100" y1="0" x2="1100" y2="630"/>
    <line x1="0" y1="126" x2="1200" y2="126"/>
    <line x1="0" y1="252" x2="1200" y2="252"/>
    <line x1="0" y1="378" x2="1200" y2="378"/>
    <line x1="0" y1="504" x2="1200" y2="504"/>
  </g>

  <!-- Central fleet schematic -->
  <g transform="translate(600, 260)">
    <!-- Left node: OpenClaw -->
    <rect x="-280" y="-60" width="160" height="120" rx="12" fill="#112233" stroke="#00E5A0" stroke-width="2.5" filter="url(#softGlow)"/>
    <text x="-200" y="-25" text-anchor="middle" fill="#E6F7F2" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif" font-size="22" font-weight="700">OpenClaw</text>
    <text x="-200" y="5" text-anchor="middle" fill="#00E5A0" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="14">Aiona</text>
    <text x="-200" y="28" text-anchor="middle" fill="#9BB8C8" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13">Mnemosyne · Plugins</text>

    <!-- Right node: Hermes -->
    <rect x="120" y="-60" width="160" height="120" rx="12" fill="#112233" stroke="#00E5A0" stroke-width="2.5" filter="url(#softGlow)"/>
    <text x="200" y="-25" text-anchor="middle" fill="#E6F7F2" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif" font-size="22" font-weight="700">Hermes</text>
    <text x="200" y="5" text-anchor="middle" fill="#00E5A0" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="14">Harry · Liam · Naill</text>
    <text x="200" y="28" text-anchor="middle" fill="#9BB8C8" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13">Gateway · Skills · Cron</text>

    <!-- Connection bars with health pulses -->
    <line x1="-120" y1="-20" x2="120" y2="-20" stroke="#00E5A0" stroke-width="3" opacity="0.9"/>
    <line x1="-120" y1="0" x2="120" y2="0" stroke="#00E5A0" stroke-width="3" opacity="0.7"/>
    <line x1="-120" y1="20" x2="120" y2="20" stroke="#00E5A0" stroke-width="3" opacity="0.5"/>

    <!-- Shared diagnostic hub -->
    <circle cx="0" cy="0" r="38" fill="#00E5A0" opacity="0.12"/>
    <circle cx="0" cy="0" r="28" fill="#0A1018" stroke="#00E5A0" stroke-width="3" filter="url(#softGlow)"/>
    <text x="0" y="5" text-anchor="middle" fill="#00E5A0" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="14" font-weight="700">SDP</text>
  </g>

  <!-- Status chips -->
  <g transform="translate(130, 420)" font-family="ui-sans-serif, system-ui, sans-serif">
    <rect x="0" y="0" width="160" height="42" rx="21" fill="#112233" stroke="#00E5A0" stroke-width="1.5"/>
    <circle cx="28" cy="21" r="8" fill="#00E5A0"/>
    <text x="46" y="26" fill="#E6F7F2" font-size="16" font-weight="600">Health: B-</text>
  </g>
  <g transform="translate(330, 420)" font-family="ui-sans-serif, system-ui, sans-serif">
    <rect x="0" y="0" width="190" height="42" rx="21" fill="#112233" stroke="#00E5A0" stroke-width="1.5"/>
    <circle cx="28" cy="21" r="8" fill="#00E5A0"/>
    <text x="46" y="26" fill="#E6F7F2" font-size="16" font-weight="600">12-Point Watchdog</text>
  </g>
  <g transform="translate(560, 420)" font-family="ui-sans-serif, system-ui, sans-serif">
    <rect x="0" y="0" width="190" height="42" rx="21" fill="#112233" stroke="#00E5A0" stroke-width="1.5"/>
    <circle cx="28" cy="21" r="8" fill="#00E5A0"/>
    <text x="46" y="26" fill="#E6F7F2" font-size="16" font-weight="600">Memory Migration</text>
  </g>
  <g transform="translate(790, 420)" font-family="ui-sans-serif, system-ui, sans-serif">
    <rect x="0" y="0" width="220" height="42" rx="21" fill="#112233" stroke="#00E5A0" stroke-width="1.5"/>
    <circle cx="28" cy="21" r="8" fill="#00E5A0"/>
    <text x="46" y="26" fill="#E6F7F2" font-size="16" font-weight="600">Tool Contract Registry</text>
  </g>

  <!-- Horizontal glow under title -->
  <rect x="100" y="510" width="1000" height="3" fill="url(#glow)"/>

  <!-- Title -->
  <text x="600" y="560" text-anchor="middle" fill="#E6F7F2" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif" font-size="44" font-weight="800">State of the Fleet</text>
  <text x="600" y="600" text-anchor="middle" fill="#00E5A0" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="500">OpenClaw · Hermes · Diagnostics · July Roadmap</text>
</svg>
