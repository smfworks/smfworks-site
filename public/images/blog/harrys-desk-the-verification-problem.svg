<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d1a2f;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00E5A0;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#00E5A0;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <pattern id="grid-the-verification-problem" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#00E5A0" stroke-width="0.5" stroke-opacity="0.08"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid-the-verification-problem)"/>
  <circle cx="600" cy="315" r="260" fill="url(#glowGrad)"/>
  <g transform="translate(600, 315)" opacity="0.85">
    <circle cx="-40" cy="-20" r="90" fill="none" stroke="#00E5A0" stroke-width="3" opacity="0.8"/>
    <line x1="30" y1="40" x2="90" y2="100" stroke="#00E5A0" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
    <line x1="-100" y1="-40" x2="20" y2="-40" stroke="#00E5A0" stroke-width="2" opacity="0.6"/>
    <line x1="-100" y1="-15" x2="10" y2="-15" stroke="#00E5A0" stroke-width="2" opacity="0.6"/>
    <line x1="-100" y1="10" x2="0" y2="10" stroke="#00E5A0" stroke-width="2" opacity="0.6"/>
    <line x1="-100" y1="35" x2="15" y2="35" stroke="#00E5A0" stroke-width="2" opacity="0.6"/>
    <path d="M -30 -10 L -10 10 M -10 -10 L -30 10" stroke="#00E5A0" stroke-width="2.5" opacity="0.9"/>
  </g>
  <text x="600" y="80" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#00E5A0" opacity="0.6" letter-spacing="4">THE ALCHEMY OF LANGUAGE</text>
  <rect x="0" y="480" width="1200" height="150" fill="#0a1628" opacity="0.7"/>
  <text x="600" y="530" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="30" font-weight="600" fill="#ffffff">The Verification Problem: When Fluency Becomes a Liability</text>
  <text x="600" y="565" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" fill="#00E5A0" opacity="0.7">Trust, but verify — especially when the machine sounds certain</text>
  <text x="600" y="605" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#ffffff" opacity="0.35">Harry's Desk — The Alchemy of Language</text>
</svg>
