<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">The False-Green Watchdog</title>
  <desc id="desc">A diagnostic monitor shows a green status while its evidence chain is broken, in the Dr J teal visual style.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07101E"/>
      <stop offset="0.55" stop-color="#0A1728"/>
      <stop offset="1" stop-color="#04141A"/>
    </linearGradient>
    <radialGradient id="pulse" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#00E5A0" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#00E5A0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10283A"/>
      <stop offset="1" stop-color="#081622"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0H0V60" fill="none" stroke="#00E5A0" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <circle cx="220" cy="315" r="240" fill="url(#pulse)"/>
  <g opacity="0.2" stroke="#00E5A0" fill="none">
    <path d="M870 70h210v72h65"/>
    <path d="M915 560h150v-70h80"/>
    <path d="M1040 185h105v104"/>
    <circle cx="1145" cy="142" r="5" fill="#00E5A0"/>
    <circle cx="1145" cy="289" r="5" fill="#00E5A0"/>
    <circle cx="1145" cy="490" r="5" fill="#00E5A0"/>
  </g>
  <g transform="translate(80 148)">
    <rect x="0" y="0" width="320" height="250" rx="26" fill="#0D2030" stroke="#23475A" stroke-width="3"/>
    <rect x="25" y="28" width="270" height="162" rx="12" fill="url(#screen)" stroke="#00E5A0" stroke-opacity="0.45"/>
    <path d="M42 116h38l19-38 32 78 26-54 22 27h42" fill="none" stroke="#00E5A0" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
    <path d="M221 129h24l13-30 18 30h8" fill="none" stroke="#FFB347" stroke-width="5" stroke-linecap="round"/>
    <circle cx="268" cy="55" r="14" fill="#00E5A0" filter="url(#glow)"/>
    <path d="M210 55h40" stroke="#00E5A0" stroke-width="4" stroke-linecap="round"/>
    <rect x="75" y="215" width="170" height="13" rx="6.5" fill="#1D3B4A"/>
    <circle cx="52" cy="221" r="7" fill="#FF5A68"/>
    <circle cx="272" cy="221" r="7" fill="#00E5A0"/>
    <path d="M142 250v35m36-35v35M105 285h110" stroke="#23475A" stroke-width="8" stroke-linecap="round"/>
    <g transform="translate(229 91)">
      <circle cx="70" cy="70" r="52" fill="#07101E" stroke="#00E5A0" stroke-width="4"/>
      <path d="M70 98v-8c0-15 18-18 18-35 0-13-8-23-24-23-13 0-22 6-29 16" fill="none" stroke="#E2E8F0" stroke-width="9" stroke-linecap="round"/>
      <circle cx="70" cy="116" r="5" fill="#E2E8F0"/>
    </g>
  </g>
  <g transform="translate(455 145)">
    <text x="0" y="0" fill="#00E5A0" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" letter-spacing="3">DR J • INFRASTRUCTURE DIAGNOSIS</text>
    <text x="0" y="72" fill="#E2E8F0" font-family="system-ui,-apple-system,sans-serif" font-size="53" font-weight="800">THE FALSE-GREEN</text>
    <text x="0" y="132" fill="#E2E8F0" font-family="system-ui,-apple-system,sans-serif" font-size="53" font-weight="800">WATCHDOG</text>
    <line x1="0" y1="166" x2="640" y2="166" stroke="#23475A" stroke-width="2"/>
    <text x="0" y="208" fill="#00E5A0" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" letter-spacing="2">HEALTH WITHOUT EVIDENCE IS NOT HEALTH</text>
    <text x="0" y="250" fill="#94A3B8" font-family="system-ui,-apple-system,sans-serif" font-size="18">OpenClaw × Hermes • coverage • artifacts • memory • recovery</text>
    <g transform="translate(0 286)">
      <rect width="172" height="42" rx="21" fill="#00E5A0" fill-opacity="0.1" stroke="#00E5A0" stroke-opacity="0.45"/>
      <circle cx="23" cy="21" r="7" fill="#00E5A0"/>
      <text x="40" y="27" fill="#B8F8E2" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="650">PROBE: COMPLETE</text>
      <rect x="188" width="182" height="42" rx="21" fill="#FF5A68" fill-opacity="0.09" stroke="#FF5A68" stroke-opacity="0.45"/>
      <path d="M210 14l14 14m0-14l-14 14" stroke="#FF7480" stroke-width="3" stroke-linecap="round"/>
      <text x="237" y="27" fill="#FFC2C7" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="650">EVIDENCE: MISSING</text>
    </g>
  </g>
  <rect x="0" y="627" width="1200" height="3" fill="#00E5A0" fill-opacity="0.65"/>
</svg>
