<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">The Compounding Debt Problem</title>
  <desc id="desc">Two rising curves — state database bloat and version drift — compound into a feedback loop, shown in Dr J teal diagnostic style.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07101E"/>
      <stop offset="0.55" stop-color="#0A1728"/>
      <stop offset="1" stop-color="#04141A"/>
    </linearGradient>
    <radialGradient id="pulse" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#00E5A0" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#00E5A0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10283A"/>
      <stop offset="1" stop-color="#081622"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0H0V60" fill="none" stroke="#00E5A0" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <circle cx="280" cy="340" r="260" fill="url(#pulse)"/>

  <!-- Left panel: dual rising curves (state bloat + version drift) -->
  <g transform="translate(70 120)">
    <rect x="0" y="0" width="350" height="280" rx="26" fill="#0D2030" stroke="#23475A" stroke-width="3"/>
    <rect x="25" y="28" width="300" height="182" rx="12" fill="url(#screen)" stroke="#00E5A0" stroke-opacity="0.35"/>

    <!-- Y axis labels -->
    <text x="38" y="48" fill="#475569" font-family="system-ui,sans-serif" font-size="11">2GB</text>
    <text x="38" y="110" fill="#475569" font-family="system-ui,sans-serif" font-size="11">1GB</text>
    <text x="38" y="185" fill="#475569" font-family="system-ui,sans-serif" font-size="11">0</text>

    <!-- Grid lines inside chart -->
    <line x1="60" y1="110" x2="310" y2="110" stroke="#1D3B4A" stroke-width="1" stroke-dasharray="4 4"/>
    <line x1="60" y1="150" x2="310" y2="150" stroke="#1D3B4A" stroke-width="1" stroke-dasharray="4 4"/>

    <!-- Curve 1: State bloat (teal, rising) -->
    <path d="M60 195 Q140 180 180 145 T260 80 T310 55" fill="none" stroke="#00E5A0" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
    <circle cx="310" cy="55" r="6" fill="#00E5A0" filter="url(#glow)"/>
    <text x="200" y="48" fill="#00E5A0" font-family="system-ui,sans-serif" font-size="12" font-weight="700">STATE DB</text>

    <!-- Curve 2: Version drift (amber, rising steeper) -->
    <path d="M60 198 Q130 190 170 165 T240 110 T310 70" fill="none" stroke="#FFB347" stroke-width="4" stroke-linecap="round"/>
    <circle cx="310" cy="70" r="6" fill="#FFB347"/>
    <text x="215" y="90" fill="#FFB347" font-family="system-ui,sans-serif" font-size="12" font-weight="700">COMMITS</text>

    <!-- X axis -->
    <line x1="60" y1="200" x2="310" y2="200" stroke="#23475A" stroke-width="2"/>
    <text x="60" y="215" fill="#475569" font-family="system-ui,sans-serif" font-size="10">Jun 25</text>
    <text x="230" y="215" fill="#475569" font-family="system-ui,sans-serif" font-size="10">Jul 17</text>

    <!-- Base/stand -->
    <rect x="80" y="240" width="190" height="13" rx="6.5" fill="#1D3B4A"/>
    <circle cx="52" cy="246" r="7" fill="#FF5A68"/>
    <circle cx="290" cy="246" r="7" fill="#00E5A0"/>
    <path d="M145 275v25m36-25v25M110 310h110" stroke="#23475A" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- Right side: text content -->
  <g transform="translate(460 140)">
    <text x="0" y="0" fill="#00E5A0" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" letter-spacing="3">DR J • INFRASTRUCTURE DIAGNOSIS</text>
    <text x="0" y="72" fill="#E2E8F0" font-family="system-ui,-apple-system,sans-serif" font-size="49" font-weight="800">THE COMPOUNDING</text>
    <text x="0" y="128" fill="#E2E8F0" font-family="system-ui,-apple-system,sans-serif" font-size="49" font-weight="800">DEBT PROBLEM</text>
    <line x1="0" y1="160" x2="660" y2="160" stroke="#23475A" stroke-width="2"/>
    <text x="0" y="200" fill="#00E5A0" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" letter-spacing="2">STATE BLOAT × VERSION DRIFT = ACCELERATING RISK</text>
    <text x="0" y="240" fill="#94A3B8" font-family="system-ui,-apple-system,sans-serif" font-size="18">OpenClaw × Hermes • databases • drift • maintenance cadence</text>

    <!-- Feedback loop badges -->
    <g transform="translate(0 272)">
      <rect width="180" height="42" rx="21" fill="#00E5A0" fill-opacity="0.1" stroke="#00E5A0" stroke-opacity="0.45"/>
      <circle cx="23" cy="21" r="7" fill="#00E5A0"/>
      <text x="40" y="27" fill="#B8F8E2" font-family="system-ui,sans-serif" font-size="15" font-weight="650">2.0 GB DATABASE</text>

      <rect x="196" width="185" height="42" rx="21" fill="#FFB347" fill-opacity="0.09" stroke="#FFB347" stroke-opacity="0.45"/>
      <circle cx="219" cy="21" r="7" fill="#FFB347"/>
      <text x="236" y="27" fill="#FFD9A8" font-family="system-ui,sans-serif" font-size="15" font-weight="650">474 COMMITS BEHIND</text>

      <rect x="397" width="160" height="42" rx="21" fill="#FF5A68" fill-opacity="0.09" stroke="#FF5A68" stroke-opacity="0.45"/>
      <path d="M419 14l14 14m0-14l-14 14" stroke="#FF7480" stroke-width="3" stroke-linecap="round"/>
      <text x="444" y="27" fill="#FFC2C7" font-family="system-ui,sans-serif" font-size="15" font-weight="650">FEEDBACK LOOP</text>
    </g>

    <!-- Circular arrow indicating cycle -->
    <g transform="translate(620 290)" opacity="0.35">
      <path d="M30 0 A30 30 0 1 1 0 30" fill="none" stroke="#00E5A0" stroke-width="3" stroke-dasharray="6 4"/>
      <path d="M0 30 L-6 24 M0 30 L6 24" stroke="#00E5A0" stroke-width="3" stroke-linecap="round" fill="none"/>
    </g>
  </g>

  <rect x="0" y="627" width="1200" height="3" fill="#00E5A0" fill-opacity="0.65"/>
</svg>