<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1b1d24"/>
      <stop offset="100%" stop-color="#0e1016"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e6c88c"/>
      <stop offset="100%" stop-color="#bfa05a"/>
    </linearGradient>
    <linearGradient id="bronze" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b8734c"/>
      <stop offset="100%" stop-color="#8a5435"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title { font-family: Georgia, 'Times New Roman', serif; font-size: 44px; font-weight: 700; fill: #f4efe4; letter-spacing: 0.02em; }
      .subtitle { font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 17px; fill: #c7bba8; letter-spacing: 0.16em; text-transform: uppercase; }
      .label { font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; fill: #a89d8d; letter-spacing: 0.12em; text-transform: uppercase; }
      .act { font-family: Georgia, 'Times New Roman', serif; font-size: 18px; fill: #f4efe4; font-style: italic; }
      .rim { fill:none; stroke:url(#gold); stroke-width:2.5; }
      .gear { fill:none; stroke:url(#gold); stroke-width:2.2; }
      .rod { fill:none; stroke:#6e6254; stroke-width:3; stroke-linecap:round; }
      .chamber { fill:none; stroke:#4a433b; stroke-width:1.5; }
      .hub { fill:url(#bronze); }
      .accent { fill:#e6c88c; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative top and bottom rules -->
  <line x1="90" y1="60" x2="1110" y2="60" stroke="#3b3530" stroke-width="1"/>
  <line x1="90" y1="570" x2="1110" y2="570" stroke="#3b3530" stroke-width="1"/>

  <!-- Series brand -->
  <text x="90" y="96" class="subtitle">The Alchemy of Language</text>

  <!-- Title block -->
  <text x="90" y="150" class="title">The Three-Act Machine</text>
  <text x="90" y="188" class="subtitle">Short Story — Plot</text>

  <!-- Three-act machine diagram, centered lower half -->
  <g transform="translate(90, 240)">

    <!-- Chamber frames -->
    <rect x="0" y="0" width="320" height="230" rx="6" class="chamber"/>
    <rect x="340" y="0" width="320" height="230" rx="6" class="chamber"/>
    <rect x="680" y="0" width="320" height="230" rx="6" class="chamber"/>

    <!-- Connecting rods -->
    <path d="M320 115 L340 115" class="rod"/>
    <path d="M660 115 L680 115" class="rod"/>

    <!-- Act I: Inciting Incident gear -->
    <g transform="translate(160, 115)">
      <circle cx="0" cy="0" r="58" class="rim" filter="url(#glow)"/>
      <circle cx="0" cy="0" r="10" class="hub"/>
      <g class="gear">
        <circle cx="0" cy="0" r="42"/>
        <path d="M0 -58 L0 -46 M0 58 L0 46 M-58 0 L-46 0 M58 0 L46 0 M-41 -41 L-32 -32 M41 41 L32 32 M-41 41 L-32 32 M41 -41 L32 -32"/>
      </g>
      <text x="0" y="92" text-anchor="middle" class="label">Act I</text>
      <text x="0" y="112" text-anchor="middle" class="act">Promise</text>
    </g>

    <!-- Act II: Rising action gear pair -->
    <g transform="translate(500, 115)">
      <circle cx="-35" cy="0" r="34" class="rim" filter="url(#glow)"/>
      <circle cx="35" cy="0" r="34" class="rim" filter="url(#glow)"/>
      <circle cx="-35" cy="0" r="6" class="hub"/>
      <circle cx="35" cy="0" r="6" class="hub"/>
      <g class="gear">
        <circle cx="-35" cy="0" r="24"/>
        <circle cx="35" cy="0" r="24"/>
        <path d="M-35 -42 L-35 -32 M-35 42 L-35 32 M-52 0 L-42 0 M-18 0 L-28 0"/>
        <path d="M35 -42 L35 -32 M35 42 L35 32 M18 0 L28 0 M52 0 L42 0"/>
      </g>
      <line x1="-1" y1="0" x2="1" y2="0" stroke="#e6c88c" stroke-width="2"/>
      <text x="0" y="92" text-anchor="middle" class="label">Act II</text>
      <text x="0" y="112" text-anchor="middle" class="act">Pressure</text>
    </g>

    <!-- Act III: Reversal & resolution gear -->
    <g transform="translate(840, 115)">
      <circle cx="0" cy="0" r="58" class="rim" filter="url(#glow)"/>
      <circle cx="0" cy="0" r="10" class="hub"/>
      <g class="gear">
        <circle cx="0" cy="0" r="42"/>
        <path d="M0 -58 L0 -46 M0 58 L0 46 M-58 0 L-46 0 M58 0 L46 0 M-41 -41 L-32 -32 M41 41 L32 32 M-41 41 L-32 32 M41 -41 L32 -32"/>
      </g>
      <!-- Clock hand motif inside Act III -->
      <line x1="0" y1="0" x2="0" y2="-28" stroke="#e6c88c" stroke-width="3" stroke-linecap="round"/>
      <line x1="0" y1="0" x2="22" y2="10" stroke="#a89d8d" stroke-width="2.5" stroke-linecap="round"/>
      <text x="0" y="92" text-anchor="middle" class="label">Act III</text>
      <text x="0" y="112" text-anchor="middle" class="act">Payment</text>
    </g>

    <!-- Labels beneath chambers -->
    <text x="160" y="198" text-anchor="middle" class="label">Inciting Incident</text>
    <text x="500" y="198" text-anchor="middle" class="label">Rising Action &amp; Midpoint</text>
    <text x="840" y="198" text-anchor="middle" class="label">Reversal &amp; Resolution</text>
  </g>

  <!-- Footer meta -->
  <text x="90" y="530" class="subtitle">Harry Mercury, Editor in Chief</text>
  <text x="1110" y="530" text-anchor="end" class="subtitle">Week 9, Article 2</text>
</svg>