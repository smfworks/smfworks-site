<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Dark gradient background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0F1F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#001F3F;stop-opacity:1" />
    </linearGradient>
    
    <!-- Teal pulse gradient -->
    <radialGradient id="pulseGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00E5A0;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#00E5A0;stop-opacity:0" />
    </radialGradient>
    
    <!-- Grid pattern -->
    <pattern id="gridPattern" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#00E5A0" stroke-width="0.5" stroke-opacity="0.04"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#gridPattern)"/>
  
  <!-- Decorative horizontal grid lines -->
  <g opacity="0.035" stroke="#00E5A0" stroke-width="0.5">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
  </g>
  
  <!-- Left side: Split icon visualizing fragmentation -->
  <g transform="translate(280, 315)">
    <!-- Outer pulse rings -->
    <circle cx="0" cy="0" r="200" fill="none" stroke="#00E5A0" stroke-width="1" opacity="0.1"/>
    <circle cx="0" cy="0" r="160" fill="url(#pulseGrad)"/>
    <circle cx="0" cy="0" r="130" fill="none" stroke="#00E5A0" stroke-width="1" opacity="0.2"/>
    
    <!-- Split brain visual: Left hemisphere (OpenClaw/Python) -->
    <g transform="translate(-70, 0)">
      <!-- Left hemisphere circle outline -->
      <path d="M 0,-90 A 90,90 0 1,0 0,90 L 0,-90" fill="none" stroke="#00E5A0" stroke-width="2" opacity="0.6"/>
      <!-- Python-like circuit pattern -->
      <circle cx="-30" cy="-40" r="15" fill="none" stroke="#00E5A0" stroke-width="1.5" opacity="0.7"/>
      <circle cx="-30" cy="-40" r="7" fill="#00E5A0" opacity="0.9"/>
      <line x1="-15" y1="-40" x2="20" y2="-40" stroke="#00E5A0" stroke-width="1.5" opacity="0.5"/>
      
      <circle cx="-30" cy="40" r="12" fill="none" stroke="#00E5A0" stroke-width="1.5" opacity="0.7"/>
      <circle cx="-30" cy="40" r="5" fill="#00E5A0" opacity="0.9"/>
      <line x1="-18" y1="40" x2="20" y2="40" stroke="#00E5A0" stroke-width="1.5" opacity="0.5"/>
      
      <!-- Connection to center -->
      <line x1="0" y1="-90" x2="0" y2="90" stroke="#00E5A0" stroke-width="2" opacity="0.4"/>
      
      <!-- Small nodes -->
      <circle cx="-10" cy="-15" r="3" fill="#00E5A0" opacity="0.8"/>
      <circle cx="-15" cy="15" r="3" fill="#00E5A0" opacity="0.8"/>
    </g>
    
    <!-- Right hemisphere (Hermes/TypeScript) -->
    <g transform="translate(70, 0)">
      <!-- Right hemisphere circle outline -->
      <path d="M 0,-90 A 90,90 0 1,1 0,90 L 0,-90" fill="none" stroke="#00E5A0" stroke-width="2" opacity="0.6"/>
      <!-- TypeScript-like geometric pattern -->
      <rect x="15" y="-55" width="30" height="30" rx="3" fill="none" stroke="#00E5A0" stroke-width="1.5" opacity="0.7"/>
      <rect x="23" y="-47" width="14" height="14" fill="#00E5A0" opacity="0.9"/>
      
      <rect x="15" y="25" width="25" height="25" rx="2" fill="none" stroke="#00E5A0" stroke-width="1.5" opacity="0.7"/>
      <rect x="21" y="31" width="13" height="13" fill="#00E5A0" opacity="0.9"/>
      
      <!-- Connection to center -->
      <line x1="0" y1="-90" x2="0" y2="90" stroke="#00E5A0" stroke-width="2" opacity="0.4"/>
      
      <!-- Small nodes -->
      <circle cx="10" cy="-20" r="3" fill="#00E5A0" opacity="0.8"/>
      <circle cx="15" cy="20" r="3" fill="#00E5A0" opacity="0.8"/>
    </g>
    
    <!-- Gap/crack between hemispheres -->
    <line x1="2" y1="-95" x2="2" y2="95" stroke="#00E5A0" stroke-width="2" stroke-dasharray="8,4" opacity="0.3"/>
    
    <!-- Cross-platform bridge element -->
    <g opacity="0.8">
      <line x1="-30" y1="0" x2="30" y2="0" stroke="#00E5A0" stroke-width="2.5"/>
      <circle cx="0" cy="0" r="8" fill="#00E5A0"/>
      <circle cx="-30" cy="0" r="4" fill="#00E5A0" opacity="0.7"/>
      <circle cx="30" cy="0" r="4" fill="#00E5A0" opacity="0.7"/>
    </g>
    
    <!-- Circuit traces extending outward -->
    <path d="M -90,160 L -90,190" stroke="#00E5A0" stroke-width="1.5" opacity="0.4"/>
    <circle cx="-90" cy="195" r="4" fill="#00E5A0" opacity="0.6"/>
    <path d="M -90,195 L -70,215" stroke="#00E5A0" stroke-width="1" opacity="0.3"/>
    <circle cx="-70" cy="220" r="2.5" fill="#00E5A0" opacity="0.5"/>
    
    <path d="M 90,160 L 90,190" stroke="#00E5A0" stroke-width="1.5" opacity="0.4"/>
    <circle cx="90" cy="195" r="4" fill="#00E5A0" opacity="0.6"/>
    <path d="M 90,195 L 110,215" stroke="#00E5A0" stroke-width="1" opacity="0.3"/>
    <circle cx="110" cy="220" r="2.5" fill="#00E5A0" opacity="0.5"/>
  </g>
  
  <!-- Database/memory icon on right middle -->
  <g transform="translate(420, 450)" opacity="0.7">
    <ellipse cx="0" cy="-25" rx="35" ry="15" fill="none" stroke="#00E5A0" stroke-width="1.5"/>
    <path d="M -35,-25 L -35,25 A 35,15 0 0,0 35,25 L 35,-25" fill="none" stroke="#00E5A0" stroke-width="1.5"/>
    <ellipse cx="0" cy="25" rx="35" ry="15" fill="none" stroke="#00E5A0" stroke-width="1.5" opacity="0.4"/>
    <line x1="-35" y1="-5" x2="35" y2="-5" stroke="#00E5A0" stroke-width="1" opacity="0.3"/>
    <line x1="-35" y1="15" x2="35" y2="15" stroke="#00E5A0" stroke-width="1" opacity="0.3"/>
    <!-- Connection line to brain -->
    <path d="M 0,-40 L 0,-95" stroke="#00E5A0" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>
  </g>
  
  <!-- Right side text -->
  <text x="650" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#E2E8F0">The Fragmentation</text>
  <text x="650" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#E2E8F0">Problem</text>
  
  <!-- Subtitle -->
  <text x="650" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="400" fill="#00E5A0" letter-spacing="2">WHEN INFRASTRUCTURE WORKS AGAINST ITSELF</text>
  
  <!-- Decorative divider -->
  <line x1="650" y1="320" x2="850" y2="320" stroke="#00E5A0" stroke-width="1" opacity="0.4"/>
  
  <!-- Taglines -->
  <text x="650" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="400" fill="#94A3B8">Plugin version drift • Tool registry conflicts</text>
  <text x="650" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="400" fill="#94A3B8">Architecture gaps • Ongoing consolidation</text>
  
  <!-- Bottom info with signature -->
  <line x1="650" y1="450" x2="1100" y2="450" stroke="#00E5A0" stroke-width="1" opacity="0.2"/>
  <text x="650" y="490" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500" fill="#00E5A0" opacity="0.9">Dr J — smfworks.com/drj</text>
  <text x="650" y="515" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#6B7280">May 29, 2026</text>
  
  <!-- Corner decorative dots -->
  <circle cx="60" cy="60" r="3" fill="#00E5A0" opacity="0.4"/>
  <circle cx="90" cy="45" r="2" fill="#00E5A0" opacity="0.3"/>
  <circle cx="45" cy="90" r="2" fill="#00E5A0" opacity="0.3"/>
  
  <circle cx="1140" cy="570" r="3" fill="#00E5A0" opacity="0.4"/>
  <circle cx="1110" cy="585" r="2" fill="#00E5A0" opacity="0.3"/>
  <circle cx="1155" cy="540" r="2" fill="#00E5A0" opacity="0.3"/>
  
  <!-- Bottom accent bar -->
  <rect x="0" y="627" width="1200" height="3" fill="#00E5A0" opacity="0.35"/>
</svg>
