<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 576">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0d1321"/>
    </linearGradient>
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="576" fill="url(#bg)"/>

  <!-- Forge glow - bottom -->
  <ellipse cx="512" cy="620" rx="500" ry="220" fill="url(#glow)" filter="url(#softglow)" opacity="0.7"/>

  <!-- Left: "test" file panel -->
  <rect x="180" y="120" width="220" height="300" rx="6" fill="#1a1f2e" stroke="#374151" stroke-width="1.5"/>
  <!-- Tab bar -->
  <rect x="180" y="120" width="220" height="28" rx="6" fill="#1e293b"/>
  <rect x="186" y="192" width="90" height="10" rx="3" fill="#374151" opacity="0.4"/>
  <!-- File label -->
  <text x="290" y="140" fill="#9ca3af" font-family="monospace" font-size="11" text-anchor="middle">test_auth.py</text>
  <!-- Code lines - green passing tests -->
  <text x="195" y="175" fill="#22c55e" font-family="monospace" font-size="11" opacity="0.9">✓ test_login()</text>
  <text x="195" y="195" fill="#22c55e" font-family="monospace" font-size="11" opacity="0.9">✓ test_logout()</text>
  <text x="195" y="215" fill="#22c55e" font-family="monospace" font-size="11" opacity="0.9">✓ test_expired()</text>
  <text x="195" y="235" fill="#22c55e" font-family="monospace" font-size="11" opacity="0.9">✓ test_refresh()</text>
  <text x="195" y="255" fill="#22c55e" font-family="monospace" font-size="11" opacity="0.8">✓ test_edge_case()</text>
  <text x="195" y="275" fill="#4b5563" font-family="monospace" font-size="11" opacity="0.5">✓ test_setup()</text>
  <text x="195" y="295" fill="#4b5563" font-family="monospace" font-size="11" opacity="0.5">✓ test_teardown()</text>
  <!-- All pass badge -->
  <rect x="240" y="360" width="100" height="24" rx="12" fill="#166534" stroke="#22c55e" stroke-width="1"/>
  <text x="290" y="376" fill="#22c55e" font-family="monospace" font-size="11" text-anchor="middle">7/7 PASS</text>

  <!-- Right: agent generating both -->
  <rect x="580" y="120" width="260" height="300" rx="6" fill="#1a1f2e" stroke="#374151" stroke-width="1.5"/>
  <rect x="580" y="120" width="260" height="28" rx="6" fill="#1e293b"/>
  <text x="710" y="140" fill="#9ca3af" font-family="monospace" font-size="11" text-anchor="middle">agent output</text>
  
  <!-- Agent code block -->
  <text x="595" y="175" fill="#f59e0b" font-family="monospace" font-size="10" opacity="0.8"># auth.py</text>
  <text x="595" y="192" fill="#c084fc" font-family="monospace" font-size="10" opacity="0.7">def handle_token(req):</text>
  <text x="595" y="207" fill="#94a3b8" font-family="monospace" font-size="10" opacity="0.6">    validate(req.token)</text>
  <text x="595" y="222" fill="#94a3b8" font-family="monospace" font-size="10" opacity="0.6">    return refresh()</text>
  
  <!-- Dividing line -->
  <line x1="595" y1="238" x2="825" y2="238" stroke="#374151" stroke-width="1" stroke-dasharray="4,4"/>
  
  <!-- Agent test block -->
  <text x="595" y="258" fill="#22c55e" font-family="monospace" font-size="10" opacity="0.8"># test_auth.py</text>
  <text x="595" y="275" fill="#c084fc" font-family="monospace" font-size="10" opacity="0.7">def test_handle_token():</text>
  <text x="595" y="290" fill="#94a3b8" font-family="monospace" font-size="10" opacity="0.6">    assert validate(tok)</text>
  <text x="595" y="305" fill="#94a3b8" font-family="monospace" font-size="10" opacity="0.6">    assert refresh() ok</text>

  <!-- Same source arrow -->
  <path d="M 710 330 L 710 350" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowamber)"/>
  <text x="710" y="370" fill="#d97706" font-family="monospace" font-size="10" text-anchor="middle" opacity="0.7">same prompt</text>
  <text x="710" y="385" fill="#d97706" font-family="monospace" font-size="10" text-anchor="middle" opacity="0.5">same blind spots</text>

  <!-- Center: equals sign with X through it -->
  <text x="490" y="280" fill="#ef4444" font-family="sans-serif" font-size="60" text-anchor="middle" font-weight="bold" opacity="0.9">≠</text>

  <!-- Large title -->
  <text x="512" y="470" fill="url(#amber)" font-family="sans-serif" font-size="52" text-anchor="middle" font-weight="bold" opacity="0.9">You Tested Nothing</text>
  <text x="512" y="500" fill="#9ca3af" font-family="sans-serif" font-size="16" text-anchor="middle" opacity="0.6">when the same blind spot writes both sides</text>

  <!-- Spark particles -->
  <circle cx="380" cy="160" r="2" fill="#f59e0b" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="820" cy="200" r="1.5" fill="#22c55e" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="130" r="1.5" fill="#ef4444" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.05;0.3" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="640" cy="440" r="2" fill="#f59e0b" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="1.6s" repeatCount="indefinite"/>
  </circle>

  <!-- Bottom border accent -->
  <rect x="0" y="556" width="1024" height="2" fill="url(#amber)" opacity="0.6"/>
</svg>