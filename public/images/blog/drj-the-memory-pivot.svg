<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0F1F"/>
      <stop offset="50%" stop-color="#001F3F"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </linearGradient>
    <radialGradient id="pulse" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#00E5A0" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00E5A0" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid overlay -->
  <g opacity="0.03" stroke="#00E5A0">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Pulse circle behind icon -->
  <circle cx="220" cy="315" r="180" fill="url(#pulse)"/>

  <!-- Memory Database Icon: Database cylinder with neural network overlay -->
  <!-- Database cylinder -->
  <ellipse cx="220" cy="260" rx="60" ry="25" fill="none" stroke="#00E5A0" stroke-width="2.5" opacity="0.8"/>
  <path d="M 160,260 L 160,370 A 60,25 0 0 0 280,370 L 280,260 A 60,25 0 0 1 160,260" fill="none" stroke="#00E5A0" stroke-width="2.5" opacity="0.8"/>
  <line x1="160" y1="300" x2="280" y2="300" stroke="#00E5A0" stroke-width="2" opacity="0.5"/>
  <line x1="160" y1="340" x2="280" y2="340" stroke="#00E5A0" stroke-width="2" opacity="0.5"/>
  
  <!-- Neural node center -->
  <circle cx="220" cy="315" r="12" fill="#00E5A0" opacity="0.2"/>
  <circle cx="220" cy="315" r="6" fill="#00E5A0"/>
  
  <!-- Circuit branch to left -->
  <path d="M 220,315 L 160,315 L 160,380" stroke="#00E5A0" stroke-width="1.5" fill="none" opacity="0.4"/>
  <circle cx="160" cy="380" r="3" fill="#00E5A0" opacity="0.6"/>
  
  <!-- Circuit branch to right -->
  <path d="M 220,315 L 280,315 L 280,250 L 320,250" stroke="#00E5A0" stroke-width="1.5" fill="none" opacity="0.4"/>
  <circle cx="320" cy="250" r="3" fill="#00E5A0" opacity="0.6"/>
  
  <!-- Circuit branch down -->
  <path d="M 220,315 L 220,380 L 180,420" stroke="#00E5A0" stroke-width="1.5" fill="none" opacity="0.4"/>
  <circle cx="180" cy="420" r="3" fill="#00E5A0" opacity="0.6"/>

  <!-- Right-side circuit decorations -->
  <g opacity="0.04" stroke="#00E5A0" stroke-width="1.5" fill="none">
    <path d="M 850,80 L 980,80 L 980,180 L 1120,180"/>
    <path d="M 900,130 L 1050,130"/>
    <circle cx="1120" cy="180" r="3.5" fill="#00E5A0" opacity="0.3"/>
    <circle cx="1050" cy="130" r="2.5" fill="#00E5A0" opacity="0.3"/>
    <path d="M 820,420 L 920,420 L 920,520 L 1080,520"/>
    <circle cx="1080" cy="520" r="3" fill="#00E5A0" opacity="0.3"/>
  </g>

  <!-- Title -->
  <text x="440" y="250" fill="#E2E8F0" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="bold" letter-spacing="-0.5">
    The Memory Pivot
  </text>

  <!-- Subtitle -->
  <text x="440" y="298" fill="#00E5A0" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="400" letter-spacing="2">
    ABANDONING HONCHO FOR MNEMOSYNE
  </text>

  <!-- Divider -->
  <line x1="440" y1="320" x2="770" y2="320" stroke="#00E5A0" stroke-width="1.5" opacity="0.25"/>

  <!-- Tagline -->
  <text x="440" y="355" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="400">
    Why we rebuilt OpenClaw's memory layer from scratch
  </text>

  <!-- Bottom accent bar -->
  <rect x="0" y="627" width="1200" height="3" fill="#00E5A0" opacity="0.4"/>
</svg>