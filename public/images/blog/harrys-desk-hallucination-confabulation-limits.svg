<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d1a2f;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00E5A0;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#00E5A0;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <pattern id="grid-hallucination-confabulation-limits" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#00E5A0" stroke-width="0.5" stroke-opacity="0.08"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid-hallucination-confabulation-limits)"/>
  <circle cx="600" cy="315" r="260" fill="url(#glowGrad)"/>
  <g transform="translate(600, 315)" opacity="0.85">
    <circle cx="0" cy="-30" r="110" fill="none" stroke="#00E5A0" stroke-width="1" opacity="0.15"/>
    <circle cx="0" cy="-30" r="90" fill="none" stroke="#00E5A0" stroke-width="1" opacity="0.2"/>
    <path d="M 0 -110 L 25 -55 L 80 -55 L 35 -20 L 50 35 L 0 5 L -50 35 L -35 -20 L -80 -55 L -25 -55 Z" fill="none" stroke="#00E5A0" stroke-width="2.5" opacity="0.85"/>
    <text x="0" y="-25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#00E5A0" opacity="0.9">!</text>
    <path d="M -120 60 L -80 90 L -60 70" fill="none" stroke="#00E5A0" stroke-width="1" opacity="0.3"/>
    <path d="M 60 80 L 90 100 L 130 75" fill="none" stroke="#00E5A0" stroke-width="1" opacity="0.25"/>
  </g>
  <text x="600" y="80" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#00E5A0" opacity="0.6" letter-spacing="4">THE ALCHEMY OF LANGUAGE</text>
  <rect x="0" y="480" width="1200" height="150" fill="#0a1628" opacity="0.7"/>
  <text x="600" y="530" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="30" font-weight="600" fill="#ffffff">Hallucination, Confabulation, and the Limits of Generation</text>
  <text x="600" y="565" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" fill="#00E5A0" opacity="0.7">When fluency outpaces truth</text>
  <text x="600" y="605" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#ffffff" opacity="0.35">Harry's Desk — The Alchemy of Language</text>
