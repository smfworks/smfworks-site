<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d1a2f;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00E5A0;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#00E5A0;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid-template" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#00E5A0" stroke-width="0.5" stroke-opacity="0.08"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid-template)"/>

  <!-- Central glow -->
  <circle cx="600" cy="315" r="260" fill="url(#glowGrad)"/>

  <!-- Prompt library illustration: cards connected to central spark -->
  <g transform="translate(600, 315)" opacity="0.9">
    <!-- Central node -->
    <circle cx="0" cy="0" r="24" fill="#00E5A0" opacity="0.2"/>
    <circle cx="0" cy="0" r="10" fill="#00E5A0"/>

    <!-- Left prompt card -->
    <g transform="translate(-220, -80)">
      <rect x="0" y="0" width="160" height="100" rx="8" fill="none" stroke="#00E5A0" stroke-width="1.5" opacity="0.7"/>
      <line x1="20" y1="25" x2="140" y2="25" stroke="#00E5A0" stroke-width="2" opacity="0.5"/>
      <line x1="20" y1="45" x2="120" y2="45" stroke="#00E5A0" stroke-width="2" opacity="0.35"/>
      <line x1="20" y1="65" x2="100" y2="65" stroke="#00E5A0" stroke-width="2" opacity="0.35"/>
    </g>

    <!-- Right prompt card -->
    <g transform="translate(60, -80)">
      <rect x="0" y="0" width="160" height="100" rx="8" fill="none" stroke="#00E5A0" stroke-width="1.5" opacity="0.7"/>
      <line x1="20" y1="25" x2="140" y2="25" stroke="#00E5A0" stroke-width="2" opacity="0.5"/>
      <line x1="20" y1="45" x2="110" y2="45" stroke="#00E5A0" stroke-width="2" opacity="0.35"/>
      <line x1="20" y1="65" x2="90" y2="65" stroke="#00E5A0" stroke-width="2" opacity="0.35"/>
    </g>

    <!-- Bottom-left prompt card -->
    <g transform="translate(-220, 60)">
      <rect x="0" y="0" width="160" height="100" rx="8" fill="none" stroke="#00E5A0" stroke-width="1.5" opacity="0.7"/>
      <line x1="20" y1="25" x2="140" y2="25" stroke="#00E5A0" stroke-width="2" opacity="0.5"/>
      <line x1="20" y1="45" x2="130" y2="45" stroke="#00E5A0" stroke-width="2" opacity="0.35"/>
      <line x1="20" y1="65" x2="80" y2="65" stroke="#00E5A0" stroke-width="2" opacity="0.35"/>
    </g>

    <!-- Bottom-right prompt card -->
    <g transform="translate(60, 60)">
      <rect x="0" y="0" width="160" height="100" rx="8" fill="none" stroke="#00E5A0" stroke-width="1.5" opacity="0.7"/>
      <line x1="20" y1="25" x2="140" y2="25" stroke="#00E5A0" stroke-width="2" opacity="0.5"/>
      <line x1="20" y1="45" x2="115" y2="45" stroke="#00E5A0" stroke-width="2" opacity="0.35"/>
      <line x1="20" y1="65" x2="95" y2="65" stroke="#00E5A0" stroke-width="2" opacity="0.35"/>
    </g>

    <!-- Connection lines to central node -->
    <line x1="-220" y1="-30" x2="-24" y2="-8" stroke="#00E5A0" stroke-width="1.5" opacity="0.4"/>
    <line x1="220" y1="-30" x2="24" y2="-8" stroke="#00E5A0" stroke-width="1.5" opacity="0.4"/>
    <line x1="-220" y1="110" x2="-24" y2="8" stroke="#00E5A0" stroke-width="1.5" opacity="0.4"/>
    <line x1="220" y1="110" x2="24" y2="8" stroke="#00E5A0" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Series mark -->
  <text x="600" y="80" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#00E5A0" opacity="0.6" letter-spacing="4">THE ALCHEMY OF LANGUAGE</text>

  <!-- Bottom title panel -->
  <rect x="0" y="480" width="1200" height="150" fill="#0a1628" opacity="0.7"/>
  <text x="600" y="530" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="30" font-weight="600" fill="#ffffff">Prompt Libraries and Custom GPTs for Writers</text>
  <text x="600" y="565" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" fill="#00E5A0" opacity="0.7">From scattered prompts to a reusable craft system</text>

  <!-- SMF Works mark -->
  <text x="600" y="605" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#ffffff" opacity="0.35">
    Harry's Desk — The Alchemy of Language
  </text>
</svg>
