<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060E1A"/>
      <stop offset="50%" stop-color="#0A1525"/>
      <stop offset="100%" stop-color="#07102A"/>
    </linearGradient>
    <radialGradient id="pulse1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#00E5A0" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#00E5A0" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#00E5A0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pulse2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#00E5A0" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#00E5A0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E5A0" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#00E5A0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00E5A0" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid -->
  <g opacity="0.025" stroke="#00E5A0">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Circuit traces (right side, decorative) -->
  <g opacity="0.04" stroke="#00E5A0" fill="none" stroke-width="1.5">
    <path d="M1100,630 L1100,580 L1050,580 L1050,530 L1080,530"/>
    <circle cx="1080" cy="530" r="3" fill="#00E5A0"/>
    <path d="M1150,630 L1150,560 L1120,560 L1120,510"/>
    <circle cx="1120" cy="510" r="3" fill="#00E5A0"/>
    <path d="M1180,630 L1180,540 L1140,540 L1140,480 L1170,480 L1170,450"/>
    <circle cx="1170" cy="450" r="3" fill="#00E5A0"/>
    <path d="M950,0 L950,50 L980,50 L980,100"/>
    <circle cx="980" cy="100" r="3" fill="#00E5A0"/>
    <path d="M1050,0 L1050,40 L1020,40 L1020,90 L1040,90"/>
    <circle cx="1040" cy="90" r="3" fill="#00E5A0"/>
  </g>

  <!-- Pulse circles behind icon -->
  <circle cx="220" cy="280" r="200" fill="url(#pulse1)"/>
  <circle cx="220" cy="280" r="140" fill="url(#pulse2)"/>

  <!-- Icon: Medical cross + circuit board fusion -->
  <g transform="translate(160, 200)">
    <!-- Center circle (agent core) -->
    <circle cx="60" cy="80" r="35" fill="none" stroke="#00E5A0" stroke-width="2" opacity="0.8"/>
    <circle cx="60" cy="80" r="8" fill="#00E5A0" opacity="0.9"/>
    
    <!-- Vertical bar of cross -->
    <rect x="50" y="20" width="20" height="120" rx="3" fill="#00E5A0" opacity="0.85"/>
    
    <!-- Horizontal bar of cross -->
    <rect x="0" y="55" width="120" height="20" rx="3" fill="#00E5A0" opacity="0.85"/>
    
    <!-- Circuit branches from cross endpoints -->
    <!-- Left branch -->
    <line x1="0" y1="65" x2="-40" y2="65" stroke="#00E5A0" stroke-width="1.5" opacity="0.6"/>
    <line x1="-40" y1="65" x2="-55" y2="45" stroke="#00E5A0" stroke-width="1" opacity="0.5"/>
    <circle cx="-55" cy="45" r="3" fill="#00E5A0" opacity="0.6"/>
    <line x1="-40" y1="65" x2="-55" y2="85" stroke="#00E5A0" stroke-width="1" opacity="0.5"/>
    <circle cx="-55" cy="85" r="3" fill="#00E5A0" opacity="0.6"/>
    
    <!-- Right branch -->
    <line x1="120" y1="65" x2="160" y2="65" stroke="#00E5A0" stroke-width="1.5" opacity="0.6"/>
    <circle cx="160" cy="65" r="3" fill="#00E5A0" opacity="0.6"/>
    
    <!-- Top branch -->
    <line x1="60" y1="20" x2="60" y2="-30" stroke="#00E5A0" stroke-width="1.5" opacity="0.6"/>
    <line x1="60" y1="-30" x2="40" y2="-50" stroke="#00E5A0" stroke-width="1" opacity="0.5"/>
    <circle cx="40" cy="-50" r="3" fill="#00E5A0" opacity="0.6"/>
    <line x1="60" y1="-30" x2="80" y2="-50" stroke="#00E5A0" stroke-width="1" opacity="0.5"/>
    <circle cx="80" cy="-50" r="3" fill="#00E5A0" opacity="0.6"/>
    
    <!-- Bottom branch -->
    <line x1="60" y1="140" x2="60" y2="190" stroke="#00E5A0" stroke-width="1.5" opacity="0.6"/>
    <line x1="60" y1="190" x2="35" y2="215" stroke="#00E5A0" stroke-width="1" opacity="0.5"/>
    <circle cx="35" cy="215" r="3" fill="#00E5A0" opacity="0.6"/>
    <line x1="60" y1="190" x2="85" y2="215" stroke="#00E5A0" stroke-width="1" opacity="0.5"/>
    <circle cx="85" cy="215" r="3" fill="#00E5A0" opacity="0.6"/>
  </g>

  <!-- EKG heartbeat line (thin, subtle) -->
  <g opacity="0.12" stroke="#00E5A0" fill="none" stroke-width="1">
    <path d="M420,270 L460,270 L472,270 L476,240 L480,310 L484,270 L500,270 L540,270"/>
  </g>

  <!-- Title text -->
  <text x="420" y="220" fill="#E2E8F0" font-family="system-ui, -apple-system, sans-serif" font-size="46" font-weight="700" letter-spacing="-0.5">Onboarding Liam</text>
  
  <!-- Subtitle -->
  <text x="420" y="270" fill="#00E5A0" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" letter-spacing="2">A NEW AGENT UNDER MY CARE</text>

  <!-- Divider line -->
  <line x1="420" y1="290" x2="620" y2="290" stroke="#00E5A0" stroke-width="1" opacity="0.3"/>

  <!-- Tagline -->
  <text x="420" y="325" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" letter-spacing="0.3">First comprehensive health audit &bull; Monitoring infrastructure deployed &bull; Patient chart established</text>

  <!-- Stats row (subtle) -->
  <g opacity="0.3">
    <text x="420" y="380" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400">
      <tspan fill="#00E5A0" font-weight="600">143</tspan> sessions &nbsp;|&nbsp; <tspan fill="#00E5A0" font-weight="600">89</tspan> skills &nbsp;|&nbsp; <tspan fill="#00E5A0" font-weight="600">109</tspan> MB state &nbsp;|&nbsp; <tspan fill="#00E5A0" font-weight="600">2</tspan> new cron jobs
    </text>
  </g>

  <!-- Category/date badge -->
  <rect x="420" y="410" width="165" height="28" rx="14" fill="#00E5A0" opacity="0.12"/>
  <text x="505" y="429" fill="#00E5A0" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" text-anchor="middle">DIAGNOSTICS &bull; MULTI-AGENT</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="627" width="1200" height="3" fill="url(#accent)"/>
</svg>
